<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logary Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg:#0f0f13; --surface:#1a1a22; --surface2:#22222e; --border:#2e2e3e;
  --accent:#7c6aff; --accent2:#ff6a8a; --accent3:#6affcc;
  --text:#e8e8f0; --muted:#7a7a96; --node-bg:#1e1e2a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:200;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-right:6px;}
.sep{width:1px;height:22px;background:var(--border);margin:0 2px;flex-shrink:0;}
.tbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbtn svg{width:14px;height:14px;}
.tbtn:hover{background:var(--surface2);color:var(--text);}
.tbtn.active{background:var(--accent);color:#fff;}
.cdot{width:17px;height:17px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;}
.cdot:hover{transform:scale(1.25);}
.cdot.on{border-color:#fff;transform:scale(1.25);}
.bslider{-webkit-appearance:none;width:72px;height:3px;border-radius:2px;background:var(--border);outline:none;cursor:pointer;}
.bslider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;}
.spacer{flex:1;}
.sbadge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);font-size:11px;color:var(--muted);transition:all .3s;white-space:nowrap;}
.sbadge.saving{color:#ffb86a;border-color:rgba(255,184,106,.35);background:rgba(255,184,106,.07);}
.sbadge.saved{color:var(--accent3);border-color:rgba(106,255,204,.35);background:rgba(106,255,204,.07);}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.abtn{padding:5px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s;}
.abtn:hover{border-color:var(--accent);color:var(--accent);}
.abtn.pri{background:var(--accent);border-color:var(--accent);color:#fff;}
.abtn.pri:hover{background:#6a58e8;}
.abtn:disabled{opacity:.5;cursor:default;}
.wrap{flex:1;position:relative;overflow:hidden;}
.gridbg{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.32;pointer-events:none;}
#viewport{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:0 0;will-change:transform;}
#connSvg{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:5;}
#drawCanvas{position:absolute;inset:0;z-index:10;touch-action:none;}
#nodeLayer{position:absolute;inset:0;pointer-events:none;z-index:20;}
.zoom-controls{position:absolute;bottom:54px;right:14px;display:flex;flex-direction:column;gap:5px;z-index:150;pointer-events:all;}
.zbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
.zbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--surface2);}
.zoom-pct{font-family:'DM Sans',monospace;font-size:10.5px;color:var(--muted);text-align:center;padding:3px 0;}
.ftxt{position:absolute;pointer-events:all;cursor:move;min-width:60px;max-width:500px;}
.ftxt textarea{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);background:transparent;border:none;outline:none;resize:none;overflow:hidden;min-height:28px;width:100%;line-height:1.3;user-select:text;-webkit-user-select:text;cursor:text;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.ftxt textarea::placeholder{color:rgba(232,232,240,.25);}
.ftxt.sel textarea{border-bottom:1.5px dashed rgba(124,106,255,.5);}
.ftxt-del{position:absolute;top:-8px;right:-8px;width:16px;height:16px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;transition:all .15s;}
.ftxt:hover .ftxt-del,.ftxt.sel .ftxt-del{display:flex;}
.ftxt-del:hover{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.rnode{position:absolute;width:240px;background:var(--node-bg);border:1.5px solid var(--border);border-radius:13px;overflow:hidden;pointer-events:all;transition:border-color .2s,box-shadow .2s;}
.rnode:hover{border-color:rgba(124,106,255,.6);box-shadow:0 0 0 3px rgba(124,106,255,.1),0 8px 28px rgba(0,0,0,.5);}
.rnode.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,255,.18);}
.node-drag{height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:grab;background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);flex-shrink:0;}
.node-drag:active{cursor:grabbing;}
.node-tag{font-family:'Syne',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:5px;}
.ndot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.node-del{width:18px;height:18px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
.node-del:hover{border-color:var(--accent2);color:var(--accent2);}
.node-body{padding:10px 12px 10px;}
.ntitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);width:100%;border:none;outline:none;background:transparent;resize:none;line-height:1.35;overflow:hidden;min-height:22px;user-select:text;-webkit-user-select:text;pointer-events:all;cursor:text;}
.ndesc{font-size:12px;color:var(--muted);line-height:1.55;width:100%;border:none;outline:none;background:transparent;resize:none;overflow:hidden;min-height:18px;margin-top:5px;user-select:text;-webkit-user-select:text;pointer-events:all;cursor:text;}
.ntitle::placeholder{color:rgba(168,168,160,.4);}
.ndesc::placeholder{color:rgba(168,168,160,.3);}
.node-foot{padding:8px 12px 10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.prog-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .3s;}
.prog-pct{font-size:10px;color:var(--muted);width:26px;text-align:right;font-family:'DM Sans',monospace;}
.prog-range{width:52px;height:3px;-webkit-appearance:none;appearance:none;background:transparent;border:none;outline:none;cursor:pointer;}
.prog-range::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;}
.rnode.type-start .node-tag{color:var(--accent3);}
.rnode.type-start .ndot{background:var(--accent3);}
.rnode.type-start{border-color:rgba(106,255,204,.22);}
.rnode.type-milestone .node-tag{color:#ffb86a;}
.rnode.type-milestone .ndot{background:#ffb86a;}
.rnode.type-milestone{border-color:rgba(255,184,106,.22);}
.rnode.type-end .node-tag{color:var(--accent2);}
.rnode.type-end .ndot{background:var(--accent2);}
.rnode.type-end{border-color:rgba(255,106,138,.22);}
.side-panel{position:absolute;right:14px;top:14px;width:210px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;z-index:100;pointer-events:all;}
.ptitle{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.naddBtn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;margin-bottom:6px;transition:all .15s;text-align:left;}
.naddBtn:hover{background:var(--surface2);border-color:var(--accent);}
.nicon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:6px 15px;font-size:11.5px;color:var(--muted);pointer-events:none;white-space:nowrap;z-index:100;}
.hint b{color:var(--accent);}
#expOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#expOverlay.show{display:flex;}
#expOverlay p{color:var(--text);font-size:13.5px;}
.spin{width:34px;height:34px;border:3px solid rgba(124,106,255,.3);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">Logary</span>
  <div class="sep"></div>
  <button class="tbtn active" id="tSel" onclick="setTool('select')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-4 7z"/></svg>Seç
  </button>
  <button class="tbtn" id="tDraw" onclick="setTool('draw')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4z"/></svg>Kalem
  </button>
  <button class="tbtn" id="tErase" onclick="setTool('erase')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l11-11 6 6z"/><path d="M6 17l-3-3"/></svg>Silgi
  </button>
  <button class="tbtn" id="tConn" onclick="setTool('connect')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M9 6h6l-3 12"/></svg>Bağla
  </button>
  <button class="tbtn" id="tText" onclick="setTool('text')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>Metin
  </button>
  <div class="sep"></div>
  <div style="display:flex;gap:5px;align-items:center;">
    <div class="cdot on" style="background:#7c6aff" data-c="#7c6aff" onclick="pickC(this)"></div>
    <div class="cdot" style="background:#ff6a8a" data-c="#ff6a8a" onclick="pickC(this)"></div>
    <div class="cdot" style="background:#6affcc" data-c="#6affcc" onclick="pickC(this)"></div>
    <div class="cdot" style="background:#ffb86a" data-c="#ffb86a" onclick="pickC(this)"></div>
    <div class="cdot" style="background:#e8e8f0" data-c="#e8e8f0" onclick="pickC(this)"></div>
  </div>
  <input class="bslider" id="bsz" type="range" min="1" max="20" value="3">
  <div class="spacer"></div>
  <div class="sbadge" id="sbadge"><div class="sdot"></div><span id="stxt">Kaydedildi</span></div>
  <button class="abtn" onclick="clearDraw()">Çizimi Temizle</button>
  <button class="abtn" onclick="clearAll()">Sıfırla</button>
  <button class="abtn pri" id="expBtn" onclick="exportPNG()">PNG İndir</button>
</div>

<div class="wrap" id="wrap">
  <div class="gridbg" id="gridbg"></div>
  <div id="viewport">
    <svg id="connSvg"></svg>
    <canvas id="drawCanvas"></canvas>
    <div id="nodeLayer"></div>
  </div>
  <div class="zoom-controls">
    <button class="zbtn" onclick="zoomBy(0.15)">+</button>
    <div class="zoom-pct" id="zoomPct">100%</div>
    <button class="zbtn" onclick="zoomBy(-0.15)">−</button>
    <button class="zbtn" onclick="resetZoom()" style="font-size:11px;margin-top:2px;">FIT</button>
  </div>
  <div class="side-panel" id="sidePanel">
    <div class="ptitle">Node Ekle</div>
    <button class="naddBtn" onclick="addNode('task')">
      <div class="nicon" style="background:rgba(124,106,255,.15);">📋</div>
      <div><div style="font-weight:600;font-size:13px;">Görev</div><div style="font-size:10.5px;color:var(--muted)">Yapılacak adım</div></div>
    </button>
    <button class="naddBtn" onclick="addNode('start')">
      <div class="nicon" style="background:rgba(106,255,204,.12);">🚀</div>
      <div><div style="font-weight:600;font-size:13px;">Başlangıç</div><div style="font-size:10.5px;color:var(--muted)">Yolculuğun başı</div></div>
    </button>
    <button class="naddBtn" onclick="addNode('milestone')">
      <div class="nicon" style="background:rgba(255,184,106,.12);">🏁</div>
      <div><div style="font-weight:600;font-size:13px;">Kilometre Taşı</div><div style="font-size:10.5px;color:var(--muted)">Önemli dönüm</div></div>
    </button>
    <button class="naddBtn" onclick="addNode('end')">
      <div class="nicon" style="background:rgba(255,106,138,.12);">🎯</div>
      <div><div style="font-weight:600;font-size:13px;">Hedef</div><div style="font-size:10.5px;color:var(--muted)">Bitiş noktası</div></div>
    </button>
  </div>
  <div class="hint" id="hint"><b>V</b> Seç · <b>P</b> Kalem · <b>E</b> Silgi · <b>C</b> Bağla · <b>T</b> Metin · <b>Space+sürükle</b> kaydır · <b>Scroll</b> zoom</div>
</div>

<div id="expOverlay"><div class="spin"></div><p>Görsel hazırlanıyor…</p></div>

<script>
// ═══════════════════════════════════════════════════════
// HARDCODED PRESET — tüm node'ların kalıcı hali
// Bu veri localStorage'ı override eder (FORCE_PRESET=true
// yaparsan her açılışta sıfırlanır, false yaparsan
// localStorage'daki değişiklikler korunur)
// ═══════════════════════════════════════════════════════
const FORCE_PRESET = false;

const PRESET_NODES = [
  {id:1, type:'start',     x:80,   y:200,
   title:'Logary v1.0 Canlıya Çıkış',
   desc:'29 Mart lansmanı. Uygulamanın marketlerde yayınlanması ve 12 kişilik Beta Tester\'in içeri alınması',
   progress:38},

  {id:2, type:'task',      x:420,  y:50,
   title:'Teknik İzleme ve Hata Avı',
   desc:'React Native kaynaklı olası UI kaymalarını, cihaza özgü hataları ve çökme raporlarını takip etme. Acil hotfix (hızlı yama) hazırlıkları.',
   progress:48},

  {id:3, type:'task',      x:420,  y:310,
   title:'Topluluk Lansmanı',
   desc:'Discord üzerinden ilk duyuruları yapma, hoş geldin mesajları ve kullanıcılardan ilk anlık geri bildirimleri toplama.',
   progress:48},

  {id:4, type:'milestone', x:790,  y:130,
   title:'Stabil v1.0.1 Sürümü',
   desc:'Lansman sonrası ilk hafta bulunan ufak tefek pürüzlerin giderildiği, performansın optimize edildiği kusursuz sürüm. (1-8 NİSAN)',
   progress:65},

  {id:5, type:'task',      x:80,   y:530,
   title:'Ana Ekran İstatistikleri',
   desc:'Aktif Ana Ekran İstatistikleri\nAna ekrandaki \'Played Games\' vb. istatistiklere tıklayınca, kullanıcıyı kendi profilinde sadece o listeye odaklanmış (filtreli) bir görünüme yönlendirme.',
   progress:32},

  {id:6, type:'task',      x:390,  y:530,
   title:'Kullanıcı Profili Erişimi',
   desc:'Kolay Profil Navigasyonu\nYorumlarda, topluluk gönderilerinde veya etiketlerde bir kullanıcı adına tıklandığında direkt olarak o kullanıcının profiline gitme yeteneği.',
   progress:55},

  {id:7, type:'task',      x:700,  y:400,
   title:"Profil 'Gönderiler' Sekmesi",
   desc:"Topluluk Feed'i (Profile Gönderiler) Kullanıcı profiline, mevcut listelerin (Backlog vb.) arasına bir 'Gönderiler' sekmesi ekleme. Bu sekmede kullanıcıların paylaştığı gönderiler (Logary Community gibi) görülecek ve diğer kullanıcılar da buna bakabilecek.",
   progress:20},

  {id:8, type:'task',      x:980,  y:380,
   title:'Odaklanmış Liste Görünümleri',
   desc:"Özel Liste Ekranları Ana ekrandaki istatistiklerden veya profil sayfasından gidildiğinde, sadece tek bir listeye odaklanan, temiz ve odaklanmış yeni ekranlar oluşturma (örnekteki Wishlist gibi). Bu, v1.1'deki 'filtreli liste' fikrinin tam bir UI ekranına dönüşmesidir.",
   progress:55},

  {id:9, type:'task',      x:700,  y:640,
   title:'v1.2 Ek Görev',
   desc:'',
   progress:0},

  {id:10, type:'task',     x:980,  y:640,
   title:'Paylaşım Butonu Fikirleri',
   desc:'',
   progress:0},

  {id:11, type:'task',     x:700,  y:790,
   title:'Profil Geliştirme',
   desc:'',
   progress:0},

  {id:12, type:'task',     x:980,  y:790,
   title:'Son',
   desc:'',
   progress:0},
];

const PRESET_CONNS = [
  {a:1,b:2},{a:1,b:3},
  {a:2,b:4},{a:3,b:4},
  {a:5,b:6},{a:6,b:7},
  {a:7,b:8},{a:7,b:9},
  {a:8,b:10},{a:9,b:11},{a:10,b:12},
];

const PRESET_LABELS = [
  {id:1, x:80,  y:140,  text:'1. Lansman ve İlk Hafta Akışı (Stabilizasyon Dönemi)'},
  {id:2, x:80,  y:470,  text:'v1.1: Hızlı Kazanım (UX & Navigasyon)'},
  {id:3, x:80,  y:730,  text:'v1.2 - v1.3: Topluluk & İçerik'},
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let tool='select', drawColor='#7c6aff', brushSz=3;
let drawing=false, lx=0, ly=0;
let nodes=[], conns=[], nid=0;
let labels=[], lid=0;
let selId=null, dragNode=null, dragOx=0, dragOy=0;
let connFrom=null, saveTimer=null;

const canvas=document.getElementById('drawCanvas');
const ctx=canvas.getContext('2d');
const NL=document.getElementById('nodeLayer');
const SVG=document.getElementById('connSvg');
const wrap=document.getElementById('wrap');
const VP=document.getElementById('viewport');
const SKEY='logary_v3';

// ═══════════════════════════════════════
// ZOOM / PAN
// ═══════════════════════════════════════
let scale=1, panX=0, panY=0;
let isPanning=false, panSx=0, panSy=0, panOx=0, panOy=0;
let spaceDown=false;

function applyVP(){
  VP.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
  const gs=40*scale;
  document.getElementById('gridbg').style.backgroundSize=`${gs}px ${gs}px`;
  document.getElementById('gridbg').style.backgroundPosition=`${panX}px ${panY}px`;
  document.getElementById('zoomPct').textContent=Math.round(scale*100)+'%';
}
function zoomBy(delta,cx,cy){
  const wr=wrap.getBoundingClientRect();
  cx=cx??wr.width/2; cy=cy??wr.height/2;
  const ns=Math.min(3,Math.max(0.15,scale+delta));
  panX=cx-(cx-panX)*(ns/scale);
  panY=cy-(cy-panY)*(ns/scale);
  scale=ns; applyVP(); resizeCanvas();
}
function resetZoom(){scale=1;panX=0;panY=0;applyVP();resizeCanvas();}

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const wr=wrap.getBoundingClientRect();
  zoomBy(e.deltaY<0?0.1:-0.1, e.clientX-wr.left, e.clientY-wr.top);
},{passive:false});

wrap.addEventListener('pointerdown',e=>{
  if(e.button===1||(e.button===0&&spaceDown)){
    isPanning=true; panSx=e.clientX; panSy=e.clientY; panOx=panX; panOy=panY;
    wrap.setPointerCapture(e.pointerId); wrap.style.cursor='grabbing'; e.preventDefault();
  }
});
wrap.addEventListener('pointermove',e=>{
  if(!isPanning)return;
  panX=panOx+(e.clientX-panSx); panY=panOy+(e.clientY-panSy); applyVP();
});
wrap.addEventListener('pointerup',()=>{isPanning=false;wrap.style.cursor='';});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.target.tagName!=='TEXTAREA'&&e.target.tagName!=='INPUT'){
    spaceDown=true;wrap.style.cursor='grab';e.preventDefault();
  }
});
document.addEventListener('keyup',e=>{if(e.code==='Space'){spaceDown=false;wrap.style.cursor='';}});

// ═══════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════
function resizeCanvas(){
  const r=wrap.getBoundingClientRect();
  const iw=Math.round(r.width/scale), ih=Math.round(r.height/scale);
  if(canvas.width===iw&&canvas.height===ih)return;
  const img=(canvas.width>0&&canvas.height>0)?ctx.getImageData(0,0,canvas.width,canvas.height):null;
  canvas.width=iw; canvas.height=ih;
  canvas.style.width=r.width+'px'; canvas.style.height=r.height+'px';
  if(img) ctx.putImageData(img,0,0);
  redrawConns();
}
function resize(){resizeCanvas();applyVP();}
window.addEventListener('resize',resize);

// ═══════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════
function setSB(state,txt){
  const b=document.getElementById('sbadge'); b.className='sbadge '+state;
  document.getElementById('stxt').textContent=txt;
}
function scheduleSave(){
  setSB('saving','Kaydediliyor…');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(doSave,900);
}
function doSave(){
  try{
    nodes.forEach(n=>{
      const el=document.getElementById('n'+n.id); if(!el)return;
      n.title=el.querySelector('.ntitle').value;
      n.desc =el.querySelector('.ndesc').value;
    });
    labels.forEach(l=>{
      const el=document.getElementById('l'+l.id); if(!el)return;
      l.text=el.querySelector('textarea').value;
    });
    localStorage.setItem(SKEY,JSON.stringify({nodes,conns,nid,labels,lid,draw:canvas.toDataURL()}));
    setSB('saved','Kaydedildi ✓');
    setTimeout(()=>setSB('','Kaydedildi'),2000);
  }catch(e){setSB('','⚠ Hata');}
}

function doLoad(){
  // FORCE_PRESET=true ise her zaman preset'i göster
  if(FORCE_PRESET) return false;
  try{
    const raw=localStorage.getItem(SKEY); if(!raw)return false;
    const d=JSON.parse(raw);
    // Eğer localStorage boşsa ya da node yoksa preset'e dön
    if(!d.nodes||d.nodes.length===0) return false;
    nodes=d.nodes; conns=d.conns||[]; nid=d.nid||0;
    labels=d.labels||[]; lid=d.lid||0;
    nodes.forEach(n=>buildNode(n));
    labels.forEach(l=>buildLabel(l));
    if(d.draw){
      const img=new Image();
      img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0);};
      img.src=d.draw;
    }
    setTimeout(redrawConns,80);
    setSB('saved','Yüklendi ✓'); setTimeout(()=>setSB('','Kaydedildi'),2000);
    return true;
  }catch(e){return false;}
}

NL.addEventListener('input',()=>scheduleSave());

// ═══════════════════════════════════════
// TOOL
// ═══════════════════════════════════════
const HINTS={
  select:'Node başlığına <b>tıkla</b> → yaz · Üst şeridi <b>sürükle</b> → taşı · <b>Space+sürükle</b> → kaydır',
  draw:'<b>Sürükle</b> çiz · Renk & kalınlık seç',
  erase:'<b>Sürükle</b> sil',
  connect:'Bir node\'a <b>tıkla</b> → başlangıç seç → başka node\'a <b>tıkla</b> → bağla',
  text:'Canvas\'a <b>tıkla</b> → metin ekle · Sürükle → taşı',
};
function setTool(t){
  tool=t;
  ['Sel','Draw','Erase','Conn','Text'].forEach(n=>{
    document.getElementById('t'+n)?.classList.remove('active');
  });
  const map={select:'Sel',draw:'Draw',erase:'Erase',connect:'Conn',text:'Text'};
  document.getElementById('t'+map[t])?.classList.add('active');
  if(t==='draw'||t==='erase'||t==='text'){
    canvas.style.pointerEvents='all';
    canvas.style.cursor=t==='draw'?'crosshair':t==='erase'?'cell':'text';
    NL.style.pointerEvents='none';
  } else {
    canvas.style.pointerEvents='none';
    canvas.style.cursor='default';
    NL.style.pointerEvents='none';
  }
  if(t!=='connect'){connFrom=null;clearHL();}
  document.getElementById('hint').innerHTML=HINTS[t]||'';
}
function pickC(el){
  document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('on'));
  el.classList.add('on'); drawColor=el.dataset.c;
}
document.getElementById('bsz').addEventListener('input',e=>brushSz=+e.target.value);

// ═══════════════════════════════════════
// DRAW
// ═══════════════════════════════════════
canvas.addEventListener('pointerdown',e=>{
  if(tool==='text'){
    const r=canvas.getBoundingClientRect();
    addLabel((e.clientX-r.left-panX)/scale,(e.clientY-r.top-panY)/scale);
    return;
  }
  if(tool!=='draw'&&tool!=='erase')return;
  drawing=true;
  const r=canvas.getBoundingClientRect();
  lx=(e.clientX-r.left)/scale; ly=(e.clientY-r.top)/scale;
  if(tool==='erase') ctx.clearRect(lx-brushSz*2,ly-brushSz*2,brushSz*4,brushSz*4);
  else{ctx.beginPath();ctx.arc(lx,ly,brushSz/2,0,Math.PI*2);ctx.fillStyle=drawColor;ctx.fill();}
});
canvas.addEventListener('pointermove',e=>{
  if(!drawing)return;
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX-r.left)/scale, y=(e.clientY-r.top)/scale;
  if(tool==='erase') ctx.clearRect(x-brushSz*2,y-brushSz*2,brushSz*4,brushSz*4);
  else{
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);
    ctx.strokeStyle=drawColor;ctx.lineWidth=brushSz;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.globalAlpha=.9;ctx.stroke();ctx.globalAlpha=1;
  }
  lx=x;ly=y;
});
canvas.addEventListener('pointerup',()=>{drawing=false;scheduleSave();});
canvas.addEventListener('pointerleave',()=>{drawing=false;});

// ═══════════════════════════════════════
// FREE TEXT LABELS
// ═══════════════════════════════════════
function addLabel(x,y){
  const id=++lid;
  const label={id,x,y,text:''};
  labels.push(label); buildLabel(label,true); scheduleSave();
}
function buildLabel(label,focusNow=false){
  const el=document.createElement('div');
  el.className='ftxt'; el.id='l'+label.id;
  el.style.cssText=`left:${label.x}px;top:${label.y}px;`;
  el.innerHTML=`<button class="ftxt-del" onclick="delLabel(${label.id})">×</button>
    <textarea rows="1" placeholder="Başlık yaz…" spellcheck="false">${label.text||''}</textarea>`;
  const ta=el.querySelector('textarea');
  const grow=()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';ta.style.width='auto';ta.style.width=Math.max(80,ta.scrollWidth)+'px';};
  ta.addEventListener('input',()=>{grow();scheduleSave();});
  setTimeout(()=>{grow();if(focusNow){ta.focus();}},0);
  let ldrag=false,lox=0,loy=0;
  ta.addEventListener('pointerdown',e=>{
    if(window.getSelection().toString())return;
    ldrag=true;
    lox=label.x-(e.clientX-panX)/scale;
    loy=label.y-(e.clientY-panY)/scale;
    el.classList.add('sel'); ta.setPointerCapture(e.pointerId);
  });
  ta.addEventListener('pointermove',e=>{
    if(!ldrag)return;
    label.x=(e.clientX-panX)/scale+lox;
    label.y=(e.clientY-panY)/scale+loy;
    el.style.left=label.x+'px'; el.style.top=label.y+'px';
  });
  ta.addEventListener('pointerup',()=>{if(ldrag){ldrag=false;scheduleSave();}});
  ta.addEventListener('focus',()=>el.classList.add('sel'));
  ta.addEventListener('blur',()=>el.classList.remove('sel'));
  NL.appendChild(el);
}
function delLabel(id){
  labels=labels.filter(l=>l.id!==id);
  document.getElementById('l'+id)?.remove(); scheduleSave();
}

// ═══════════════════════════════════════
// NODES
// ═══════════════════════════════════════
const TLABEL={task:'GÖREV',start:'BAŞLANGIÇ',milestone:'KM TAŞI',end:'HEDEF'};

function addNode(type,x,y){
  const id=++nid;
  const r=wrap.getBoundingClientRect();
  const node={id,type,
    x:x??(-panX/scale+50+Math.random()*(r.width/scale-300)),
    y:y??(-panY/scale+50+Math.random()*(r.height/scale-220)),
    title:'',desc:'',
    progress:type==='start'?100:type==='end'?0:35};
  nodes.push(node); buildNode(node); scheduleSave(); return node;
}

function buildNode(node){
  const el=document.createElement('div');
  el.className='rnode type-'+node.type;
  el.id='n'+node.id;
  el.style.cssText=`left:${node.x}px;top:${node.y}px;`;
  el.innerHTML=`
    <div class="node-drag" id="drag${node.id}">
      <div class="node-tag"><div class="ndot"></div>${TLABEL[node.type]||node.type.toUpperCase()}</div>
      <button class="node-del" onclick="delNode(${node.id})">×</button>
    </div>
    <div class="node-body">
      <textarea class="ntitle" rows="1" placeholder="Başlık yaz…" spellcheck="false">${node.title||''}</textarea>
      <textarea class="ndesc" rows="3" placeholder="Açıklama ekle…" spellcheck="false">${node.desc||''}</textarea>
    </div>
    <div class="node-foot">
      <div class="prog-track"><div class="prog-fill" id="pf${node.id}" style="width:${node.progress}%"></div></div>
      <input class="prog-range" type="range" min="0" max="100" value="${node.progress}" oninput="setProgress(${node.id},+this.value)">
      <span class="prog-pct" id="pp${node.id}">${node.progress}%</span>
    </div>`;
  el.querySelectorAll('textarea').forEach(ta=>{
    const grow=()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';};
    ta.addEventListener('input',grow); setTimeout(grow,0);
  });
  const handle=el.querySelector('#drag'+node.id);
  handle.addEventListener('pointerdown',e=>{
    if(e.target.tagName==='BUTTON')return;
    if(tool==='connect'){handleConn(node.id,el);return;}
    selectNode(node.id); dragNode=node;
    dragOx=node.x-(e.clientX-panX)/scale;
    dragOy=node.y-(e.clientY-panY)/scale;
    el.style.zIndex=800; handle.setPointerCapture(e.pointerId); e.preventDefault();
  });
  handle.addEventListener('pointermove',e=>{
    if(!dragNode||dragNode.id!==node.id)return;
    node.x=(e.clientX-panX)/scale+dragOx;
    node.y=(e.clientY-panY)/scale+dragOy;
    el.style.left=node.x+'px'; el.style.top=node.y+'px';
    redrawConns();
  });
  handle.addEventListener('pointerup',()=>{
    if(dragNode&&dragNode.id===node.id){dragNode=null;scheduleSave();}
  });
  el.querySelector('.node-body').addEventListener('pointerdown',e=>{
    if(tool==='connect'){e.preventDefault();handleConn(node.id,el);}
  });
  NL.appendChild(el);
}

function selectNode(id){
  document.querySelectorAll('.rnode').forEach(n=>n.classList.remove('sel'));
  selId=id; if(id) document.getElementById('n'+id)?.classList.add('sel');
}
function setProgress(id,v){
  const n=nodes.find(x=>x.id===id); if(!n)return; n.progress=v;
  document.getElementById('pf'+id).style.width=v+'%';
  document.getElementById('pp'+id).textContent=v+'%';
  scheduleSave();
}
function delNode(id){
  nodes=nodes.filter(n=>n.id!==id); conns=conns.filter(c=>c.a!==id&&c.b!==id);
  document.getElementById('n'+id)?.remove(); redrawConns(); scheduleSave();
}

// ═══════════════════════════════════════
// CONNECT
// ═══════════════════════════════════════
function handleConn(id,el){
  if(connFrom===null){
    connFrom=id; el.classList.add('sel'); el.style.borderColor='#ffb86a';
  } else if(connFrom!==id){
    if(!conns.find(c=>(c.a===connFrom&&c.b===id)||(c.a===id&&c.b===connFrom)))
      conns.push({a:connFrom,b:id});
    clearHL(); connFrom=null; redrawConns(); scheduleSave();
  }
}
function clearHL(){document.querySelectorAll('.rnode').forEach(n=>{n.style.borderColor='';});}

function midOf(id){
  const el=document.getElementById('n'+id); if(!el)return null;
  const n=nodes.find(x=>x.id===id); if(!n)return null;
  const w=el.offsetWidth, h=el.offsetHeight;
  return{r:{x:n.x+w,y:n.y+h/2},l:{x:n.x,y:n.y+h/2},cx:n.x+w/2,cy:n.y+h/2};
}
function redrawConns(){
  SVG.innerHTML='';
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=`<marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="rgba(124,106,255,.75)"/></marker>`;
  SVG.appendChild(defs);
  conns.forEach(c=>{
    const a=midOf(c.a),b=midOf(c.b); if(!a||!b)return;
    const dx=b.cx-a.cx;
    const x1=dx>=0?a.r.x:a.l.x, y1=a.r.y;
    const x2=dx>=0?b.l.x:b.r.x, y2=b.l.y;
    const cp=Math.abs(x2-x1)*.45;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1},${y1} C${x1+(dx>=0?cp:-cp)},${y1} ${x2+(dx>=0?-cp:cp)},${y2} ${x2},${y2}`);
    p.setAttribute('stroke','rgba(124,106,255,.55)');
    p.setAttribute('stroke-width','1.5');
    p.setAttribute('fill','none');
    p.setAttribute('stroke-dasharray','5,3');
    p.setAttribute('marker-end','url(#arr)');
    SVG.appendChild(p);
  });
}

// ═══════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
  const m={v:'select',p:'draw',e:'erase',c:'connect',t:'text'};
  if(m[e.key.toLowerCase()])setTool(m[e.key.toLowerCase()]);
  if((e.key==='Delete'||e.key==='Backspace')&&selId)delNode(selId);
  if(e.key==='Escape'){selId=null;connFrom=null;clearHL();document.querySelectorAll('.rnode').forEach(n=>n.classList.remove('sel'));}
  if((e.key==='='||e.key==='+')&&(e.ctrlKey||e.metaKey)){e.preventDefault();zoomBy(0.1);}
  if(e.key==='-'&&(e.ctrlKey||e.metaKey)){e.preventDefault();zoomBy(-0.1);}
  if(e.key==='0'&&(e.ctrlKey||e.metaKey)){e.preventDefault();resetZoom();}
});

// ═══════════════════════════════════════
// CLEAR
// ═══════════════════════════════════════
function clearDraw(){ctx.clearRect(0,0,canvas.width,canvas.height);scheduleSave();}
function clearAll(){
  if(!confirm('Her şey silinecek. Devam?'))return;
  clearDraw();nodes=[];conns=[];labels=[];NL.innerHTML='';SVG.innerHTML='';nid=0;lid=0;
  localStorage.removeItem(SKEY);setSB('','Temizlendi');
}

// ═══════════════════════════════════════
// PNG EXPORT
// ═══════════════════════════════════════
async function exportPNG(){
  const btn=document.getElementById('expBtn');
  const ov=document.getElementById('expOverlay');
  btn.disabled=true; ov.classList.add('show');
  document.getElementById('sidePanel').style.visibility='hidden';
  document.getElementById('hint').style.visibility='hidden';
  document.querySelector('.zoom-controls').style.visibility='hidden';
  try{
    const shot=await html2canvas(wrap,{
      backgroundColor:'#0f0f13',scale:2,useCORS:true,allowTaint:true,logging:false,
      ignoreElements:el=>el.id==='drawCanvas',
    });
    const final=document.createElement('canvas');
    final.width=shot.width; final.height=shot.height;
    const fc=final.getContext('2d');
    fc.drawImage(shot,0,0);
    fc.drawImage(canvas,0,0,final.width,final.height);
    const a=document.createElement('a');
    a.download='logary-roadmap.png'; a.href=final.toDataURL('image/png'); a.click();
  }catch(err){alert('Export hatası: '+err.message);}
  finally{
    document.getElementById('sidePanel').style.visibility='';
    document.getElementById('hint').style.visibility='';
    document.querySelector('.zoom-controls').style.visibility='';
    ov.classList.remove('show'); btn.disabled=false;
  }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
window.addEventListener('load',()=>{
  resize();
  const ok=doLoad();
  if(!ok) loadPreset();
  setTool('select');
});

function loadPreset(){
  nodes=[...PRESET_NODES.map(n=>({...n}))];
  conns=[...PRESET_CONNS.map(c=>({...c}))];
  labels=[...PRESET_LABELS.map(l=>({...l}))];
  nid=Math.max(...nodes.map(n=>n.id),0);
  lid=Math.max(...labels.map(l=>l.id),0);

  nodes.forEach(n=>{
    buildNode(n);
    const el=document.getElementById('n'+n.id); if(!el)return;
    el.querySelector('.ntitle').value=n.title;
    el.querySelector('.ndesc').value=n.desc;
    el.querySelector('.prog-fill').style.width=n.progress+'%';
    el.querySelector('.prog-range').value=n.progress;
    el.querySelector('.prog-pct').textContent=n.progress+'%';
    el.querySelectorAll('textarea').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
  });

  labels.forEach(l=>buildLabel(l));

  setTimeout(()=>{redrawConns();doSave();},150);
}
</script>
