<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Logary Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg:#0f0f13; --surface:#1a1a22; --surface2:#22222e; --border:#2e2e3e;
  --accent:#7c6aff; --accent2:#ff6a8a; --accent3:#6affcc;
  --text:#e8e8f0; --muted:#7a7a96; --node-bg:#1e1e2a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100%;width:100%;overflow:hidden;overscroll-behavior:none;touch-action:none;-webkit-overflow-scrolling:none;position:fixed;}
body{display:flex;flex-direction:column;}
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;-ms-overflow-style:none;}
#loginScreen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 44px;width:360px;display:flex;flex-direction:column;gap:20px;box-shadow:0 32px 80px rgba(0,0,0,.6);}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.5px;text-align:center;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-top:-14px;}
.login-label{font-size:11.5px;color:var(--muted);letter-spacing:.5px;margin-bottom:6px;font-family:'Syne',sans-serif;font-weight:600;text-transform:uppercase;}
.login-input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;-webkit-text-security:disc;}
.login-input:focus{border-color:var(--accent);}
.login-input.err{border-color:var(--accent2);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.login-btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;letter-spacing:-.2px;}
.login-btn:hover{background:#6a58e8;transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,106,255,.35);}
.login-btn:active{transform:translateY(0);}
.login-err{font-size:12.5px;color:var(--accent2);text-align:center;display:none;background:rgba(255,106,138,.08);border:1px solid rgba(255,106,138,.25);border-radius:8px;padding:8px;}
.login-err.show{display:block;}
.login-dots{display:flex;gap:6px;justify-content:center;margin-top:4px;}
.login-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s;}
.topbar{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:200;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-right:6px;cursor:pointer;user-select:none;}
.sep{width:1px;height:22px;background:var(--border);margin:0 2px;flex-shrink:0;}
.tbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbtn svg{width:14px;height:14px;}
.tbtn:hover{background:var(--surface2);color:var(--text);}
.tbtn.active{background:var(--accent);color:#fff;}
.cdot{width:17px;height:17px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;}
.cdot:hover{transform:scale(1.25);}
.cdot.on{border-color:#fff;transform:scale(1.25);}
.bslider{-webkit-appearance:none;appearance:none;width:72px;height:3px;border-radius:2px;background:var(--border);outline:none;cursor:pointer;}
.bslider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;}
.spacer{flex:1;}
.sbadge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);font-size:11px;color:var(--muted);transition:all .3s;white-space:nowrap;}
.sbadge.saving{color:#ffb86a;border-color:rgba(255,184,106,.35);background:rgba(255,184,106,.07);}
.sbadge.saved{color:var(--accent3);border-color:rgba(106,255,204,.35);background:rgba(106,255,204,.07);}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.abtn{padding:5px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s;}
.abtn:hover{border-color:var(--accent);color:var(--accent);}
.abtn.pri{background:var(--accent);border-color:var(--accent);color:#fff;}
.abtn.pri:hover{background:#6a58e8;}
.abtn:disabled{opacity:.5;cursor:default;}
.abtn.logout{border-color:rgba(255,106,138,.3);color:var(--accent2);}
.abtn.logout:hover{border-color:var(--accent2);background:rgba(255,106,138,.08);}
.wrap{flex:1;position:relative;overflow:hidden;}
.gridbg{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.32;pointer-events:none;}
#viewport{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:0 0;will-change:transform;}
#connSvg{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:5;}
#drawCanvas{position:absolute;inset:0;z-index:10;touch-action:none;}
#nodeLayer{position:absolute;inset:0;pointer-events:none;z-index:20;}
.zoom-controls{position:absolute;bottom:54px;right:14px;display:flex;flex-direction:column;gap:5px;z-index:150;pointer-events:all;}
.zbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
.zbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--surface2);}
.zoom-pct{font-family:'DM Sans',monospace;font-size:10.5px;color:var(--muted);text-align:center;padding:3px 0;}
.ftxt{position:absolute;pointer-events:all;cursor:move;min-width:60px;max-width:500px;}
.ftxt textarea{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);background:transparent;border:none;outline:none;resize:none;overflow:hidden;min-height:28px;width:100%;line-height:1.3;user-select:text;-webkit-user-select:text;cursor:text;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.ftxt textarea::placeholder{color:rgba(232,232,240,.25);}
.ftxt.sel textarea{border-bottom:1.5px dashed rgba(124,106,255,.5);}
.ftxt-del{position:absolute;top:-8px;right:-8px;width:16px;height:16px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;transition:all .15s;}
.ftxt:hover .ftxt-del,.ftxt.sel .ftxt-del{display:flex;}
.ftxt-del:hover{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.rnode{position:absolute;width:240px;background:var(--node-bg);border:1.5px solid var(--border);border-radius:13px;overflow:hidden;pointer-events:all;transition:border-color .2s,box-shadow .2s;}
.rnode:hover{border-color:rgba(124,106,255,.6);box-shadow:0 0 0 3px rgba(124,106,255,.1),0 8px 28px rgba(0,0,0,.5);}
.rnode.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,255,.18);}
.node-drag{height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:grab;background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);flex-shrink:0;}
.node-drag:active{cursor:grabbing;}
.node-tag{font-family:'Syne',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:5px;}
.ndot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.node-del{width:18px;height:18px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
.node-del:hover{border-color:var(--accent2);color:var(--accent2);}
.node-body{padding:10px 12px 10px;}
.ntitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);width:100%;border:none;outline:none;background:transparent;resize:none;line-height:1.35;overflow:hidden;min-height:22px;user-select:text;-webkit-user-select:text;pointer-events:all;cursor:text;}
.ndesc{font-size:12px;color:var(--muted);line-height:1.55;width:100%;border:none;outline:none;background:transparent;resize:none;overflow:hidden;min-height:18px;margin-top:5px;user-select:text;-webkit-user-select:text;pointer-events:all;cursor:text;}
.ntitle::placeholder{color:rgba(168,168,160,.4);}
.ndesc::placeholder{color:rgba(168,168,160,.3);}
.node-foot{padding:8px 12px 10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.prog-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .3s;}
.prog-pct{font-size:10px;color:var(--muted);width:26px;text-align:right;font-family:'DM Sans',monospace;}
.prog-range{width:52px;height:3px;-webkit-appearance:none;appearance:none;background:transparent;border:none;outline:none;cursor:pointer;}
.prog-range::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;}
.rnode.type-start .node-tag{color:var(--accent3);}
.rnode.type-start .ndot{background:var(--accent3);}
.rnode.type-start{border-color:rgba(106,255,204,.22);}
.rnode.type-milestone .node-tag{color:#ffb86a;}
.rnode.type-milestone .ndot{background:#ffb86a;}
.rnode.type-milestone{border-color:rgba(255,184,106,.22);}
.rnode.type-end .node-tag{color:var(--accent2);}
.rnode.type-end .ndot{background:var(--accent2);}
.rnode.type-end{border-color:rgba(255,106,138,.22);}
.side-panel{position:absolute;right:14px;top:14px;width:210px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;z-index:100;pointer-events:all;}
.ptitle{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.naddBtn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;margin-bottom:6px;transition:all .15s;text-align:left;}
.naddBtn:hover{background:var(--surface2);border-color:var(--accent);}
.nicon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:6px 15px;font-size:11.5px;color:var(--muted);pointer-events:none;white-space:nowrap;z-index:100;}
.hint b{color:var(--accent);}
#expOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#expOverlay.show{display:flex;}
#expOverlay p{color:var(--text);font-size:13.5px;}
.spin{width:34px;height:34px;border:3px solid rgba(124,106,255,.3);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

#logPanel{position:fixed;top:0;right:0;bottom:0;z-index:500;width:340px;max-width:90vw;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:-12px 0 48px rgba(0,0,0,.5);}
#logPanel.open{transform:translateX(0);}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.log-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text);display:flex;align-items:center;gap:8px;}
.log-title-dot{width:7px;height:7px;border-radius:50%;background:var(--accent3);flex-shrink:0;}
.log-close{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.log-close:hover{border-color:var(--accent2);color:var(--accent2);}
.log-stats{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;}
.log-stat{flex:1;padding:10px 14px;text-align:center;border-right:1px solid var(--border);}
.log-stat:last-child{border-right:none;}
.log-stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--accent);}
.log-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
.log-filter{display:flex;gap:4px;padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.log-chip{padding:3px 9px;border-radius:20px;font-size:10.5px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;}
.log-chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.log-list{flex:1;overflow-y:auto;padding:8px;}
.log-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--muted);font-size:13px;}
.log-empty-icon{font-size:36px;opacity:.4;}
.log-item{display:flex;gap:10px;padding:10px 8px;border-radius:10px;transition:background .15s;margin-bottom:2px;}
.log-item:hover{background:var(--surface2);}
.log-icon{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.log-content{flex:1;min-width:0;}
.log-action{font-size:12.5px;font-weight:500;color:var(--text);line-height:1.3;}
.log-detail{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.log-time{font-size:10px;color:var(--text3,#555);margin-top:3px;font-family:'DM Sans',monospace;}
.log-clear{padding:12px;border-top:1px solid var(--border);flex-shrink:0;}
.log-clear button{width:100%;padding:9px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s;}
.log-clear button:hover{border-color:var(--accent2);color:var(--accent2);}

/* ── MOBILE BAR ── */
.mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--surface);border-top:1px solid var(--border);padding:8px 12px calc(8px + env(safe-area-inset-bottom));flex-direction:column;gap:8px;box-shadow:0 -8px 32px rgba(0,0,0,.4);}
.mob-tools{display:flex;gap:3px;background:var(--surface2);border-radius:14px;padding:4px;}
.mob-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 2px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;cursor:pointer;transition:all .18s;min-height:46px;}
.mob-btn svg{width:17px;height:17px;stroke-width:2;}
.mob-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(124,106,255,.4);}
.mob-btn.add{color:var(--accent);}
.mob-btn.add.active{background:var(--accent);color:#fff;}
.mob-row2{display:flex;align-items:center;gap:8px;}
.mob-colors-wrap{display:flex;align-items:center;gap:6px;background:var(--surface2);border-radius:10px;padding:7px 10px;flex:1;}
.mob-bslider{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:2px;background:var(--border);outline:none;cursor:pointer;}
.mob-bslider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(124,106,255,.5);}
.mob-icon-btn{width:44px;height:44px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.mob-icon-btn:active{transform:scale(.93);}
.mob-icon-btn.danger{border-color:rgba(255,106,138,.3);color:var(--accent2);}

.mob-node-sheet{display:none;position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-top:1px solid var(--border);border-radius:22px 22px 0 0;padding:14px 16px calc(16px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:0 -16px 48px rgba(0,0,0,.5);}
.mob-node-sheet.open{transform:translateY(0);}
.mob-sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px;}
.mob-sheet-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;text-align:center;margin-bottom:14px;}
.mob-sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mob-sheet-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.mob-sheet-btn:active{transform:scale(.96);border-color:var(--accent);}
.mob-sheet-btn span{font-size:20px;}
.mob-sheet-close{width:100%;margin-top:10px;padding:12px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
.mob-sheet-close:active{background:var(--surface2);}
.mob-overlay{display:none;position:fixed;inset:0;z-index:390;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);}
.mob-overlay.show{display:block;}

@media(max-width:768px){
  .login-box{width:calc(100vw - 32px);padding:28px 24px;}
  .topbar .sep,.topbar .tbtn,.topbar .cdot,.topbar .bslider,.topbar .sbadge,.topbar .abtn,.topbar .bug-topbar-btn{display:none!important;}
  .topbar{padding:10px 16px;}
  .logo{font-size:19px;}
  .mob-bar{display:flex;}
  .mob-node-sheet{display:block;}
  .hint{display:none;}
  .side-panel{display:none;}
  .zoom-controls{bottom:calc(130px + env(safe-area-inset-bottom));right:12px;}
  .rnode{width:200px;}
  .wrap{overflow:hidden;}
  #bugPanel{width:100%;border-right:none;top:auto;bottom:0;height:88vh;transform:translateY(100%);border-radius:20px 20px 0 0;box-shadow:0 -16px 48px rgba(0,0,0,.5);}
  #bugPanel.open{transform:translateY(0);}
  #logPanel{width:100%;border-left:none;top:auto;bottom:0;height:88vh;transform:translateY(100%);border-radius:20px 20px 0 0;box-shadow:0 -16px 48px rgba(0,0,0,.5);}
  #logPanel.open{transform:translateY(0);}
}
/* ── BUG REPORT PANEL ── */
#bugPanel{position:fixed;top:0;left:0;bottom:0;z-index:500;width:420px;max-width:100vw;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:12px 0 48px rgba(0,0,0,.5);}
#bugPanel.open{transform:translateX(0);}
.bug-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.bug-header-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text);display:flex;align-items:center;gap:8px;}
.bug-header-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);flex-shrink:0;}
.bug-close{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.bug-close:hover{border-color:var(--accent2);color:var(--accent2);}
.bug-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.bug-tab{flex:1;padding:10px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;}
.bug-tab.on{color:var(--accent2);border-bottom-color:var(--accent2);}
.bug-list{flex:1;overflow-y:auto;padding:10px;}
.bug-item{background:var(--node-bg);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;}
.bug-item:hover{border-color:rgba(255,106,138,.3);}
.bug-item.resolved{border-color:rgba(106,255,204,.25);opacity:.75;}
.bug-item-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 0;}
.bug-status{font-family:'Syne',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:4px;}
.bug-status.open{background:rgba(255,106,138,.15);color:var(--accent2);border:1px solid rgba(255,106,138,.3);}
.bug-status.resolved{background:rgba(106,255,204,.12);color:var(--accent3);border:1px solid rgba(106,255,204,.25);}
.bug-time{font-size:10px;color:var(--muted);}
.bug-content{padding:8px 12px;font-size:12.5px;color:var(--text);line-height:1.5;white-space:pre-wrap;word-break:break-word;}
.bug-media{padding:0 12px 8px;display:flex;gap:6px;flex-wrap:wrap;}
.bug-media-item{width:80px;height:60px;border-radius:8px;object-fit:cover;cursor:pointer;border:1px solid var(--border);}
.bug-media-video{width:120px;height:70px;border-radius:8px;object-fit:cover;}
.bug-reply-box{padding:8px 12px;border-top:1px solid var(--border);background:rgba(106,255,204,.04);}
.bug-reply-text{font-size:11.5px;color:var(--accent3);line-height:1.4;white-space:pre-wrap;}
.bug-reply-label{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:4px;opacity:.7;}
.bug-actions{display:flex;gap:6px;padding:8px 12px 10px;}
.bug-action-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11.5px;cursor:pointer;transition:all .15s;}
.bug-action-btn:hover{border-color:var(--accent);color:var(--accent);}
.bug-action-btn.resolve{border-color:rgba(106,255,204,.3);color:var(--accent3);}
.bug-action-btn.resolve:hover{background:rgba(106,255,204,.1);}
.bug-new{flex-shrink:0;border-top:1px solid var(--border);padding:14px;}
.bug-new-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.bug-new-ta{width:100%;min-height:80px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;resize:none;outline:none;line-height:1.5;transition:border-color .2s;touch-action:auto;}
.bug-new-ta:focus{border-color:var(--accent2);}
.bug-new-ta::placeholder{color:var(--muted);}
.bug-media-row{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;}
.bug-preview{position:relative;width:64px;height:52px;}
.bug-preview img,.bug-preview video{width:64px;height:52px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
.bug-preview-del{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--accent2);color:#fff;font-size:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.bug-upload-btn{width:52px;height:52px;border-radius:8px;border:1.5px dashed var(--border);background:transparent;color:var(--muted);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.bug-upload-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.bug-send-row{display:flex;gap:8px;margin-top:10px;}
.bug-send-btn{flex:1;padding:10px;border-radius:10px;border:none;background:var(--accent2);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;}
.bug-send-btn:hover{background:#e8557a;}
.bug-send-btn:disabled{opacity:.5;cursor:default;}
.bug-empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--muted);font-size:13px;}
.bug-empty-icon{font-size:40px;opacity:.35;}
.bug-reply-input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;margin-bottom:6px;transition:border-color .2s;}
.bug-reply-input:focus{border-color:var(--accent3);}
.bug-reply-submit{width:100%;padding:8px;border-radius:8px;border:none;background:var(--accent3);color:var(--ink,#0f0f13);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}
.bug-reply-submit:hover{opacity:.85;}

/* Bug buton topbar'da */
.bug-topbar-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid rgba(255,106,138,.3);border-radius:8px;background:transparent;color:var(--accent2);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s;}
.bug-topbar-btn:hover{background:rgba(255,106,138,.08);}
.bug-topbar-btn svg{width:14px;height:14px;}
/* Mobil bug butonu */
.mob-bug-btn{width:44px;height:44px;border-radius:11px;border:1px solid rgba(255,106,138,.3);background:transparent;color:var(--accent2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.mob-bug-btn:active{transform:scale(.93);}

/* Lightbox */
#lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);align-items:center;justify-content:center;}
#lightbox.show{display:flex;}
#lightbox img,#lightbox video{max-width:92vw;max-height:88vh;border-radius:12px;}
#lightbox-close{position:absolute;top:18px;right:20px;background:transparent;border:none;color:#fff;font-size:28px;cursor:pointer;}</style>

</head>

<script>
const LOG_KEY='logary_activity_v1';
let logFilter='all';
let logClickCount=0,logClickTimer=null;

const DISCORD_WEBHOOK='https://discord.com/api/webhooks/1485407990080082115/C-I_U4t3VdyLc2p_j6UN6G178kKwVjuUXZJeJgS_VxFBATdRZWQvwdO_MuhiKdnJqess';
const DC_COLORS={node:0x7c6aff,start:0x6affcc,milestone:0xffb86a,end:0xff6a8a,delete:0xff4444,edit:0x5b8cff,progress:0xffb86a,conn:0x7ab4e8};
const DC_ICONS={task:'📋',start:'🚀',milestone:'🏁',end:'🎯',delete:'🗑️',edit:'✏️',progress:'📊',conn:'🔗'};

function progressBar(pct){const f=Math.round(pct/10);return '█'.repeat(f)+'░'.repeat(10-f)+` ${pct}%`;}

async function sendDiscord(type,nodeType,title,desc='',progress=null,extra=null){
  try{
    const color=DC_COLORS[nodeType]||DC_COLORS[type]||0x7c6aff;
    const now=new Date();
    const timeStr=now.toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const fields=[];
    if(desc)fields.push({name:'Açıklama',value:desc.slice(0,200)+(desc.length>200?'…':''),inline:false});
    if(progress!==null)fields.push({name:'İlerleme',value:progressBar(progress),inline:false});
    if(extra)fields.push({name:'Detay',value:extra,inline:false});
    fields.push({name:'Zaman',value:timeStr,inline:true});
    const typeLabels={task:'Görev',start:'Başlangıç',milestone:'Kilometre Taşı',end:'Hedef'};
    const icon=DC_ICONS[nodeType]||DC_ICONS[type]||'📌';
    if(nodeType&&typeLabels[nodeType])fields.push({name:'Tip',value:`${icon} ${typeLabels[nodeType]}`,inline:true});
    const actionLabels={node:'➕ Yeni Node Eklendi',delete:'🗑️ Node Silindi',edit:'✏️ Node Güncellendi',progress:'📊 İlerleme Güncellendi',conn:'🔗 Bağlantı Eklendi'};
    const res=await fetch(DISCORD_WEBHOOK+'?wait=true',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'Logary Roadmap',embeds:[{title:actionLabels[type]||type,description:`**${title||'(başlıksız)'}**`,color,fields,footer:{text:'Logary Roadmap • logaryapp.github.io'},timestamp:now.toISOString()}]})});
    if(!res.ok){const err=await res.text();console.warn('Discord hata:',res.status,err);}
  }catch(e){console.warn('Discord webhook hatası:',e);}
}

function logAdd(type,action,detail=''){
  const entry={type,action,detail,ts:Date.now()};
  const logs=JSON.parse(localStorage.getItem(LOG_KEY)||'[]');
  logs.unshift(entry);if(logs.length>200)logs.length=200;
  localStorage.setItem(LOG_KEY,JSON.stringify(logs));
  syncLogToSupabase(logs);
}
async function syncLogToSupabase(logs){

function buildLabel(label,focusNow=false){
  const el=document.createElement('div');el.className='ftxt';el.id='l'+label.id;el.style.cssText=`left:${label.x}px;top:${label.y}px;`;
  el.innerHTML=`<button class="ftxt-del" onclick="delLabel(${label.id})">×</button><textarea rows="1" placeholder="Başlık yaz…" spellcheck="false">${label.text||''}</textarea>`;
  const ta=el.querySelector('textarea');
  const grow=()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';ta.style.width='auto';ta.style.width=Math.max(80,ta.scrollWidth)+'px';};
  ta.addEventListener('input',()=>{grow();scheduleSave();});setTimeout(()=>{grow();if(focusNow)ta.focus();},0);
  let ldrag=false,lox=0,loy=0;
  ta.addEventListener('pointerdown',e=>{if(window.getSelection().toString())return;ldrag=true;lox=label.x-(e.clientX-panX)/scale;loy=label.y-(e.clientY-panY)/scale;el.classList.add('sel');ta.setPointerCapture(e.pointerId);});
  ta.addEventListener('pointermove',e=>{if(!ldrag)return;label.x=(e.clientX-panX)/scale+lox;label.y=(e.clientY-panY)/scale+loy;el.style.left=label.x+'px';el.style.top=label.y+'px';});
  ta.addEventListener('pointerup',()=>{if(ldrag){ldrag=false;scheduleSave();}});
  ta.addEventListener('focus',()=>el.classList.add('sel'));ta.addEventListener('blur',()=>el.classList.remove('sel'));
  NL.appendChild(el);
}
function delLabel(id){labels=labels.filter(l=>l.id!==id);document.getElementById('l'+id)?.remove();scheduleSave();}

const TLABEL={task:'GÖREV',start:'BAŞLANGIÇ',milestone:'KM TAŞI',end:'HEDEF'};
function addNode(type,x,y){
  const id=++nid;const r=wrap.getBoundingClientRect();
  const node={id,type,x:x??(-panX/scale+50+Math.random()*(r.width/scale-300)),y:y??(-panY/scale+50+Math.random()*(r.height/scale-220)),title:'',desc:'',progress:type==='start'?100:type==='end'?0:35};
  nodes.push(node);buildNode(node);scheduleSave();
  logAdd('node',`Node eklendi: ${TLABEL[type]||type}`,`Pozisyon: ${Math.round(node.x)}, ${Math.round(node.y)}`);
  return node;
}
function buildNode(node){
  const el=document.createElement('div');el.className='rnode type-'+node.type;el.id='n'+node.id;el.style.cssText=`left:${node.x}px;top:${node.y}px;`;
  el.innerHTML=`
    <div class="node-drag" id="drag${node.id}">
      <div class="node-tag"><div class="ndot"></div>${TLABEL[node.type]||node.type.toUpperCase()}</div>
      <button class="node-del" onclick="delNode(${node.id})">×</button>
    </div>
    <div class="node-body">
      <textarea class="ntitle" rows="1" placeholder="Başlık yaz…" spellcheck="false">${node.title||''}</textarea>
      <textarea class="ndesc" rows="3" placeholder="Açıklama ekle…" spellcheck="false">${node.desc||''}</textarea>
    </div>
    <div class="node-foot">
      <div class="prog-track"><div class="prog-fill" id="pf${node.id}" style="width:${node.progress}%"></div></div>
      <input class="prog-range" type="range" min="0" max="100" value="${node.progress}" oninput="setProgress(${node.id},+this.value)">
      <span class="prog-pct" id="pp${node.id}">${node.progress}%</span>
    </div>`;
  let dcSent=false,dcTimer=null;
  function tryDC(){
    if(dcSent)return;clearTimeout(dcTimer);
    dcTimer=setTimeout(()=>{
      const title=el.querySelector('.ntitle').value.trim();if(!title)return;
      node.title=el.querySelector('.ntitle').value;node.desc=el.querySelector('.ndesc').value;
      dcSent=true;sendDiscord('node',node.type,node.title,node.desc,node.progress);
      logAdd('node',`Discord'a gönderildi: ${node.title}`,`%${node.progress}`);
    },800);
  }
  el.querySelectorAll('textarea').forEach(ta=>{
    const grow=()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';};
    let editTimer=null;
    ta.addEventListener('input',()=>{grow();clearTimeout(editTimer);editTimer=setTimeout(()=>{const field=ta.classList.contains('ntitle')?'Başlık':'Açıklama';logAdd('edit',`${field} düzenlendi`,ta.value.slice(0,60)+(ta.value.length>60?'…':''));},2000);});
    ta.addEventListener('blur',tryDC);setTimeout(grow,0);
  });
  el.querySelector('.prog-range').addEventListener('change',tryDC);
  const handle=el.querySelector('#drag'+node.id);
  handle.addEventListener('pointerdown',e=>{if(e.target.tagName==='BUTTON')return;if(tool==='connect'){handleConn(node.id,el);return;}selectNode(node.id);dragNode=node;dragOx=node.x-(e.clientX-panX)/scale;dragOy=node.y-(e.clientY-panY)/scale;el.style.zIndex=800;handle.setPointerCapture(e.pointerId);e.preventDefault();});
  handle.addEventListener('pointermove',e=>{if(!dragNode||dragNode.id!==node.id)return;node.x=(e.clientX-panX)/scale+dragOx;node.y=(e.clientY-panY)/scale+dragOy;el.style.left=node.x+'px';el.style.top=node.y+'px';redrawConns();});
  handle.addEventListener('pointerup',()=>{if(dragNode&&dragNode.id===node.id){dragNode=null;scheduleSave();}});
  el.querySelector('.node-body').addEventListener('pointerdown',e=>{if(tool==='connect'){e.preventDefault();handleConn(node.id,el);}});
  NL.appendChild(el);
}
function selectNode(id){document.querySelectorAll('.rnode').forEach(n=>n.classList.remove('sel'));selId=id;if(id)document.getElementById('n'+id)?.classList.add('sel');}
function setProgress(id,v){
  const n=nodes.find(x=>x.id===id);if(!n)return;const old=n.progress;n.progress=v;
  document.getElementById('pf'+id).style.width=v+'%';document.getElementById('pp'+id).textContent=v+'%';
  logAdd('progress',`İlerleme güncellendi: ${n.title||'(başlıksız)'}`,`%${old} → %${v}`);scheduleSave();
}
function delNode(id){
  const n=nodes.find(x=>x.id===id);
  logAdd('delete',`Node silindi: ${n?.title||'(başlıksız)'}`,TLABEL[n?.type]||'');
  sendDiscord('delete',n?.type,n?.title||'(başlıksız)',n?.desc||'');
  nodes=nodes.filter(n=>n.id!==id);conns=conns.filter(c=>c.a!==id&&c.b!==id);
  document.getElementById('n'+id)?.remove();redrawConns();scheduleSave();
}
function handleConn(id,el){
  if(connFrom===null){connFrom=id;el.classList.add('sel');el.style.borderColor='#ffb86a';}
  else if(connFrom!==id){
    if(!conns.find(c=>(c.a===connFrom&&c.b===id)||(c.a===id&&c.b===connFrom))){
      conns.push({a:connFrom,b:id});
      const a=nodes.find(x=>x.id===connFrom),b=nodes.find(x=>x.id===id);
      logAdd('conn','Bağlantı eklendi',`${a?.title||'Node'} → ${b?.title||'Node'}`);
      sendDiscord('conn','conn',`${a?.title||'Node'} → ${b?.title||'Node'}`,'');
    }
    clearHL();connFrom=null;redrawConns();scheduleSave();
  }
}
function clearHL(){document.querySelectorAll('.rnode').forEach(n=>{n.style.borderColor='';});}
function midOf(id){const el=document.getElementById('n'+id);if(!el)return null;const n=nodes.find(x=>x.id===id);if(!n)return null;const w=el.offsetWidth,h=el.offsetHeight;return{r:{x:n.x+w,y:n.y+h/2},l:{x:n.x,y:n.y+h/2},cx:n.x+w/2,cy:n.y+h/2};}
function redrawConns(){
  if(!SVG)return;SVG.innerHTML='';
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=`<marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="rgba(124,106,255,.75)"/></marker>`;
  SVG.appendChild(defs);
  conns.forEach(c=>{
    const a=midOf(c.a),b=midOf(c.b);if(!a||!b)return;
    const dx=b.cx-a.cx;const x1=dx>=0?a.r.x:a.l.x,y1=a.r.y,x2=dx>=0?b.l.x:b.r.x,y2=b.l.y;
    const cp=Math.abs(x2-x1)*.45;const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1},${y1} C${x1+(dx>=0?cp:-cp)},${y1} ${x2+(dx>=0?-cp:cp)},${y2} ${x2},${y2}`);
    p.setAttribute('stroke','rgba(124,106,255,.55)');p.setAttribute('stroke-width','1.5');p.setAttribute('fill','none');p.setAttribute('stroke-dasharray','5,3');p.setAttribute('marker-end','url(#arr)');
    SVG.appendChild(p);
  });
}

function clearDraw(){ctx.clearRect(0,0,canvas.width,canvas.height);scheduleSave();}

function clearAll(){if(!confirm('Her şey silinecek. Devam?'))return;clearDraw();nodes=[];conns=[];labels=[];NL.innerHTML='';SVG.innerHTML='';nid=0;lid=0;localStorage.removeItem(SKEY);setSB('','Temizlendi');}

async function exportPNG(){
  const btn=document.getElementById('expBtn'),ov=document.getElementById('expOverlay');
  btn.disabled=true;ov.classList.add('show');
  document.getElementById('sidePanel').style.visibility='hidden';
  document.getElementById('hint').style.visibility='hidden';
  document.querySelector('.zoom-controls').style.visibility='hidden';
  try{
    const shot=await html2canvas(wrap,{backgroundColor:'#0f0f13',scale:2,useCORS:true,allowTaint:true,logging:false,ignoreElements:el=>el.id==='drawCanvas'});
    const final=document.createElement('canvas');final.width=shot.width;final.height=shot.height;
    const fc=final.getContext('2d');fc.drawImage(shot,0,0);fc.drawImage(canvas,0,0,final.width,final.height);
    const a=document.createElement('a');a.download='logary-roadmap.png';a.href=final.toDataURL('image/png');a.click();
  }catch(err){alert('Export hatası: '+err.message);}
  finally{document.getElementById('sidePanel').style.visibility='';document.getElementById('hint').style.visibility='';document.querySelector('.zoom-controls').style.visibility='';ov.classList.remove('show');btn.disabled=false;}
}

function loadPreset(){
  nodes=[...PRESET_NODES.map(n=>({...n}))];conns=[...PRESET_CONNS.map(c=>({...c}))];labels=[...PRESET_LABELS.map(l=>({...l}))];
  nid=Math.max(...nodes.map(n=>n.id),0);lid=Math.max(...labels.map(l=>l.id),0);
  nodes.forEach(n=>{buildNode(n);const el=document.getElementById('n'+n.id);if(!el)return;el.querySelector('.ntitle').value=n.title;el.querySelector('.ndesc').value=n.desc;el.querySelector('.prog-fill').style.width=n.progress+'%';el.querySelector('.prog-range').value=n.progress;el.querySelector('.prog-pct').textContent=n.progress+'%';el.querySelectorAll('textarea').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});});
  labels.forEach(l=>buildLabel(l));setTimeout(()=>{redrawConns();doSave();},150);
}

const BUG_WEBHOOK='https://discord.com/api/webhooks/1485422309811556372/vT4K0vEjo4q9fdoGq5fNfmy5kQq1QhK5fMd-AIxXHpDeiPKmK1Xb2ZayipV7YoCH7V1k';
let bugTab='open';
let bugPendingFiles=[];

function openBug(){document.getElementById('bugPanel').classList.add('open');loadBugs();}
function closeBug(){document.getElementById('bugPanel').classList.remove('open');}

function setBugTab(t){
  bugTab=t;
  document.getElementById('bugTabOpen').classList.toggle('on',t==='open');
  document.getElementById('bugTabResolved').classList.toggle('on',t==='resolved');
  loadBugs();
}

async function loadBugs(){
  const list=document.getElementById('bugList');
  list.innerHTML=`<div class="bug-empty-state"><div class="bug-empty-icon">⏳</div><span>Yükleniyor…</span></div>`;
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/bugreports?status=eq.${bugTab}&order=created_at.desc`,{headers:SUPA_HEADERS});
    const bugs=await res.json();
    if(!bugs||bugs.length===0){list.innerHTML=`<div class="bug-empty-state"><div class="bug-empty-icon">${bugTab==='open'?'🎉':'📭'}</div><span>${bugTab==='open'?'Hiç açık bug yok!':'Henüz çözülen bug yok'}</span></div>`;return;}
    list.innerHTML=bugs.map(b=>renderBugItem(b)).join('');
  }catch(e){list.innerHTML=`<div class="bug-empty-state"><div class="bug-empty-icon">⚠️</div><span>Yüklenemedi</span></div>`;}
}

function renderBugItem(b){
  const d=new Date(b.created_at);
  const timeStr=d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  let mediaHtml='';
  if(b.media_url){
    const urls=b.media_url.split(',').filter(Boolean);
    mediaHtml=`<div class="bug-media">${urls.map(u=>{
      const isVideo=u.match(/\.(mp4|webm|mov|avi)/i);
      return isVideo
        ?`<video class="bug-media-video" src="${u}" controls onclick="event.stopPropagation()"></video>`
        :`<img class="bug-media-item" src="${u}" onclick="openLightbox('${u}')" alt="bug media">`;
    }).join('')}</div>`;
  }
  let replyHtml='';
  if(b.reply){replyHtml=`<div class="bug-reply-box"><div class="bug-reply-label">Yanıt</div><div class="bug-reply-text">${b.reply}</div></div>`;}

  const ownerActions=isOwner()?`
    <div class="bug-actions">
      ${b.status==='open'?`
        <div style="display:flex;flex-direction:column;gap:5px;flex:1;">
          <input class="bug-reply-input" id="ri${b.id}" placeholder="Yanıt yaz…" onclick="event.stopPropagation()">
          <div style="display:flex;gap:6px;">
            <button class="bug-reply-submit" style="flex:1;" onclick="sendReply(${b.id})">Yanıt Gönder</button>
            <button class="bug-action-btn resolve" style="flex:1;" onclick="resolveBug(${b.id})">✓ Çözüldü</button>
          </div>
        </div>`
      :`<button class="bug-action-btn" style="flex:1;" onclick="reopenBug(${b.id})">Yeniden Aç</button>`}
    </div>`:'';

  return `<div class="bug-item${b.status==='resolved'?' resolved':''}">
    <div class="bug-item-head">
      <span class="bug-status ${b.status}">${b.status==='open'?'Açık':'Çözüldü'}</span>
      <span class="bug-time">${timeStr}</span>
    </div>
    <div class="bug-content">${b.content||''}</div>
    ${mediaHtml}
    ${replyHtml}
    ${ownerActions}
  </div>`;
}

function handleBugFiles(input){
  const files=Array.from(input.files);
  files.forEach(f=>{
    bugPendingFiles.push(f);
    const reader=new FileReader();
    reader.onload=e=>{
      const idx=bugPendingFiles.length-1;
      const row=document.getElementById('bugMediaRow');
      const preview=document.createElement('div');preview.className='bug-preview';preview.id='prev'+idx;
      const isVideo=f.type.startsWith('video/');
      preview.innerHTML=isVideo
        ?`<video src="${e.target.result}" class="bug-media-item"></video><button class="bug-preview-del" onclick="removeBugFile(${idx})">×</button>`
        :`<img src="${e.target.result}" class="bug-media-item"><button class="bug-preview-del" onclick="removeBugFile(${idx})">×</button>`;
      row.insertBefore(preview,row.querySelector('label'));
    };
    reader.readAsDataURL(f);
  });
  input.value='';
}

function removeBugFile(idx){
  bugPendingFiles[idx]=null;
  document.getElementById('prev'+idx)?.remove();
}

async function uploadBugFiles(){
  const urls=[];
  for(const f of bugPendingFiles){
    if(!f)continue;
    const ext=f.name.split('.').pop();
    const name=`${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const res=await fetch(`${SUPA_URL}/storage/v1/object/bugreports/${name}`,{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':f.type},
      body:f
    });
    if(res.ok){urls.push(`${SUPA_URL}/storage/v1/object/public/bugreports/${name}`);}
  }
  return urls;
}

async function submitBug(){
  const text=document.getElementById('bugText').value.trim();
  if(!text&&bugPendingFiles.filter(Boolean).length===0){alert('Açıklama yaz veya dosya ekle!');return;}
  const btn=document.getElementById('bugSendBtn');btn.disabled=true;btn.textContent='Gönderiliyor…';
  try{
    const urls=await uploadBugFiles();
    const res=await fetch(`${SUPA_URL}/rest/v1/bugreports`,{
      method:'POST',
      headers:{...SUPA_HEADERS,'Prefer':'return=representation'},
      body:JSON.stringify({content:text,media_url:urls.join(','),status:'open'})
    });
    const rows=await res.json();
    document.getElementById('bugText').value='';
    bugPendingFiles=[];
    document.querySelectorAll('.bug-preview').forEach(p=>p.remove());
    await sendBugToDiscord(text,urls);
    setBugTab('open');
  }catch(e){alert('Gönderilemedi: '+e.message);}
  btn.disabled=false;btn.textContent='🐛 Gönder';
}

async function sendBugToDiscord(content,mediaUrls=[]){
  try{
    const embeds=[{
      title:'🐛 Yeni Bug Raporu',
      description:content||'(açıklama yok)',
      color:0xff6a8a,
      fields:[{name:'Durum',value:'🔴 Açık',inline:true},{name:'Zaman',value:new Date().toLocaleString('tr-TR'),inline:true}],
      footer:{text:'Logary Bug Reports'},
      timestamp:new Date().toISOString()
    }];
    const imgUrls=mediaUrls.filter(u=>!u.match(/\.(mp4|webm|mov)/i));
    const videoUrls=mediaUrls.filter(u=>u.match(/\.(mp4|webm|mov)/i));
    if(imgUrls.length>0) embeds[0].image={url:imgUrls[0]};
    imgUrls.slice(1).forEach(u=>embeds.push({image:{url:u},color:0xff6a8a}));
    if(videoUrls.length>0) embeds[0].fields.push({name:'🎥 Video',value:videoUrls.map(u=>`[İzle](${u})`).join('\n'),inline:false});
    await fetch(BUG_WEBHOOK+'?wait=true',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'Logary Bug Bot',embeds})});
  }catch(e){console.warn('Bug Discord hatası:',e);}
}

async function sendReply(id){
  const input=document.getElementById('ri'+id);
  const reply=input?.value?.trim();if(!reply)return;
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/bugreports?id=eq.${id}`,{headers:SUPA_HEADERS});
    const rows=await res.json();
    const bug=rows?.[0];
    await fetch(`${SUPA_URL}/rest/v1/bugreports?id=eq.${id}`,{method:'PATCH',headers:SUPA_HEADERS,body:JSON.stringify({reply})});
    const embeds=[{
      title:'💬 Bug Yanıtlandı',
      description:reply,
      color:0x7ab4e8,
      fields:[{name:'Bug İçeriği',value:(bug?.content||'(yok)').slice(0,300),inline:false}],
      footer:{text:'Logary Bug Reports'},
      timestamp:new Date().toISOString()
    }];
    if(bug?.media_url){
      const urls=bug.media_url.split(',').filter(Boolean);
      const imgUrl=urls.find(u=>!u.match(/\.(mp4|webm|mov)/i));
      if(imgUrl)embeds[0].image={url:imgUrl};
    }
    await fetch(BUG_WEBHOOK+'?wait=true',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'Logary Bug Bot',embeds})});
    loadBugs();
  }catch(e){alert('Yanıt gönderilemedi');}
}

async function resolveBug(id){
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/bugreports?id=eq.${id}`,{headers:SUPA_HEADERS});
    const rows=await res.json();
    const bug=rows?.[0];
    await fetch(`${SUPA_URL}/rest/v1/bugreports?id=eq.${id}`,{method:'PATCH',headers:SUPA_HEADERS,body:JSON.stringify({status:'resolved'})});
    const embeds=[{
      title:'✅ Bug Çözüldü',
      description:(bug?.content||'(yok)').slice(0,300),
      color:0x6affcc,
      fields:[{name:'Durum',value:'✅ Çözüldü',inline:true}],
      footer:{text:'Logary Bug Reports'},
      timestamp:new Date().toISOString()
    }];
    if(bug?.media_url){
      const urls=bug.media_url.split(',').filter(Boolean);
      const imgUrl=urls.find(u=>!u.match(/\.(mp4|webm|mov)/i));
      if(imgUrl)embeds[0].image={url:imgUrl};
    }
    await fetch(BUG_WEBHOOK+'?wait=true',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'Logary Bug Bot',embeds})});
    loadBugs();
  }catch(e){}
}

async function reopenBug(id){
  try{await fetch(`${SUPA_URL}/rest/v1/bugreports?id=eq.${id}`,{method:'PATCH',headers:SUPA_HEADERS,body:JSON.stringify({status:'open',reply:null})});loadBugs();}catch(e){}
}

function openLightbox(url){
  const lb=document.getElementById('lightbox');
  const content=document.getElementById('lightbox-content');
  content.innerHTML=url.match(/\.(mp4|webm|mov)/i)?`<video src="${url}" controls autoplay style="max-width:92vw;max-height:88vh;border-radius:12px;"></video>`:`<img src="${url}" style="max-width:92vw;max-height:88vh;border-radius:12px;">`;
  lb.classList.add('show');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show');}
