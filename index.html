<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Logary Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg:#0f0f13; --surface:#1a1a22; --surface2:#22222e; --border:#2e2e3e;
  --accent:#7c6aff; --accent2:#ff6a8a; --accent3:#6affcc;
  --text:#e8e8f0; --muted:#7a7a96; --node-bg:#1e1e2a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  height:100%;width:100%;
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:none;
  -webkit-overflow-scrolling:none;
  position:fixed;
}
body{display:flex;flex-direction:column;}

::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;-ms-overflow-style:none;}

/* ── LOGIN SCREEN ── */
#loginScreen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:0;
}
.login-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:40px 44px;
  width:360px;
  display:flex;flex-direction:column;gap:20px;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
}
.login-logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:26px;
  letter-spacing:-.5px;text-align:center;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
}
.login-sub{
  font-size:13px;color:var(--muted);text-align:center;margin-top:-14px;
}
.login-label{
  font-size:11.5px;color:var(--muted);letter-spacing:.5px;margin-bottom:6px;
  font-family:'Syne',sans-serif;font-weight:600;text-transform:uppercase;
}
.login-input{
  width:100%;padding:11px 14px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s;
  -webkit-text-security:disc;
}
.login-input:focus{border-color:var(--accent);}
.login-input.err{border-color:var(--accent2);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.login-btn{
  width:100%;padding:12px;border-radius:10px;
  border:none;background:var(--accent);
  color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;
  cursor:pointer;transition:all .2s;letter-spacing:-.2px;
}
.login-btn:hover{background:#6a58e8;transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,106,255,.35);}
.login-btn:active{transform:translateY(0);}
.login-err{
  font-size:12.5px;color:var(--accent2);text-align:center;
  display:none;background:rgba(255,106,138,.08);
  border:1px solid rgba(255,106,138,.25);border-radius:8px;padding:8px;
}
.login-err.show{display:block;}
.login-dots{
  display:flex;gap:6px;justify-content:center;margin-top:4px;
}
.login-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--border);transition:background .2s;
}
/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:200;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-right:6px;}
.sep{width:1px;height:22px;background:var(--border);margin:0 2px;flex-shrink:0;}
.tbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbtn svg{width:14px;height:14px;}
.tbtn:hover{background:var(--surface2);color:var(--text);}
.tbtn.active{background:var(--accent);color:#fff;}
.cdot{width:17px;height:17px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;}
.cdot:hover{transform:scale(1.25);}
.cdot.on{border-color:#fff;transform:scale(1.25);}
.bslider{-webkit-appearance:none;appearance:none;width:72px;height:3px;border-radius:2px;background:var(--border);outline:none;cursor:pointer;}
.bslider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;}
.spacer{flex:1;}
.sbadge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);font-size:11px;color:var(--muted);transition:all .3s;white-space:nowrap;}
.sbadge.saving{color:#ffb86a;border-color:rgba(255,184,106,.35);background:rgba(255,184,106,.07);}
.sbadge.saved{color:var(--accent3);border-color:rgba(106,255,204,.35);background:rgba(106,255,204,.07);}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.abtn{padding:5px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s;}
.abtn:hover{border-color:var(--accent);color:var(--accent);}
.abtn.pri{background:var(--accent);border-color:var(--accent);color:#fff;}
.abtn.pri:hover{background:#6a58e8;}
.abtn:disabled{opacity:.5;cursor:default;}
.abtn.logout{border-color:rgba(255,106,138,.3);color:var(--accent2);}
.abtn.logout:hover{border-color:var(--accent2);background:rgba(255,106,138,.08);}
/* ── CANVAS ── */
.wrap{flex:1;position:relative;overflow:hidden;}
.gridbg{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.32;pointer-events:none;}
#viewport{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:0 0;will-change:transform;}
#connSvg{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:5;}
#drawCanvas{position:absolute;inset:0;z-index:10;touch-action:none;}
#nodeLayer{position:absolute;inset:0;pointer-events:none;z-index:20;}
.zoom-controls{position:absolute;bottom:54px;right:14px;display:flex;flex-direction:column;gap:5px;z-index:150;pointer-events:all;}
.zbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
.zbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--surface2);}
.zoom-pct{font-family:'DM Sans',monospace;font-size:10.5px;color:var(--muted);text-align:center;padding:3px 0;}
.ftxt{position:absolute;pointer-events:all;cursor:move;min-width:60px;max-width:500px;}
.ftxt textarea{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);background:transparent;border:none;outline:none;resize:none;overflow:hidden;min-height:28px;width:100%;line-height:1.3;user-select:text;-webkit-user-select:text;cursor:text;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.ftxt textarea::placeholder{color:rgba(232,232,240,.25);}
.ftxt.sel textarea{border-bottom:1.5px dashed rgba(124,106,255,.5);}
.ftxt-del{position:absolute;top:-8px;right:-8px;width:16px;height:16px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;transition:all .15s;}
.ftxt:hover .ftxt-del,.ftxt.sel .ftxt-del{display:flex;}
.ftxt-del:hover{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.rnode{position:absolute;width:240px;background:var(--node-bg);border:1.5px solid var(--border);border-radius:13px;overflow:hidden;pointer-events:all;transition:border-color .2s,box-shadow .2s;}
.rnode:hover{border-color:rgba(124,106,255,.6);box-shadow:0 0 0 3px rgba(124,106,255,.1),0 8px 28px rgba(0,0,0,.5);}
.rnode.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,255,.18);}
.node-drag{height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:grab;background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);flex-shrink:0;}
.node-drag:active{cursor:grabbing;}
.node-tag{font-family:'Syne',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:5px;}
.ndot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.node-del{width:18px;height:18px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
.node-del:hover{border-color:var(--accent2);color:var(--accent2);}
.node-body{padding:10px 12px 10px;}
.ntitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);width:100%;border:none;outline:none;background:transparent;resize:none;line-height:1.35;overflow:hidden;min-height:22px;user-select:text;-webkit-user-select:text;pointer-events:all;cursor:text;}
.ndesc{font-size:12px;color:var(--muted);line-height:1.55;width:100%;border:none;outline:none;background:transparent;resize:none;overflow:hidden;min-height:18px;margin-top:5px;user-select:text;-webkit-user-select:text;pointer-events:all;cursor:text;}
.ntitle::placeholder{color:rgba(168,168,160,.4);}
.ndesc::placeholder{color:rgba(168,168,160,.3);}
.node-foot{padding:8px 12px 10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.prog-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .3s;}
.prog-pct{font-size:10px;color:var(--muted);width:26px;text-align:right;font-family:'DM Sans',monospace;}
.prog-range{width:52px;height:3px;-webkit-appearance:none;appearance:none;background:transparent;border:none;outline:none;cursor:pointer;}
.prog-range::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;}
.node-dc-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:7px 12px;border:none;
  background:rgba(88,101,242,.12);
  color:#7289da;
  font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;
  cursor:pointer;transition:all .18s;
  border-top:1px solid var(--border);
  pointer-events:all;
}
.node-dc-btn:hover{background:rgba(88,101,242,.28);color:#fff;}
.node-dc-btn.sending{opacity:.5;cursor:default;pointer-events:none;}
.node-dc-btn.sent{background:rgba(106,255,204,.15);color:var(--accent3);}
.rnode.type-start .node-tag{color:var(--accent3);}
.rnode.type-start .ndot{background:var(--accent3);}
.rnode.type-start{border-color:rgba(106,255,204,.22);}
.rnode.type-milestone .node-tag{color:#ffb86a;}
.rnode.type-milestone .ndot{background:#ffb86a;}
.rnode.type-milestone{border-color:rgba(255,184,106,.22);}
.rnode.type-end .node-tag{color:var(--accent2);}
.rnode.type-end .ndot{background:var(--accent2);}
.rnode.type-end{border-color:rgba(255,106,138,.22);}
.side-panel{position:absolute;right:14px;top:14px;width:210px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;z-index:100;pointer-events:all;}
.ptitle{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.naddBtn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;margin-bottom:6px;transition:all .15s;text-align:left;}
.naddBtn:hover{background:var(--surface2);border-color:var(--accent);}
.nicon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:6px 15px;font-size:11.5px;color:var(--muted);pointer-events:none;white-space:nowrap;z-index:100;}
.hint b{color:var(--accent);}
#expOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#expOverlay.show{display:flex;}
#expOverlay p{color:var(--text);font-size:13.5px;}
.spin{width:34px;height:34px;border:3px solid rgba(124,106,255,.3);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── ACTIVITY LOG PANEL ── */
#logPanel{
  position:fixed;top:0;right:0;bottom:0;z-index:500;
  width:340px;max-width:90vw;
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  box-shadow:-12px 0 48px rgba(0,0,0,.5);
}
#logPanel.open{transform:translateX(0);}
.log-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.log-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.log-title-dot{width:7px;height:7px;border-radius:50%;background:var(--accent3);flex-shrink:0;}
.log-close{
  width:28px;height:28px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.log-close:hover{border-color:var(--accent2);color:var(--accent2);}
.log-stats{
  display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;
}
.log-stat{
  flex:1;padding:10px 14px;text-align:center;border-right:1px solid var(--border);
}
.log-stat:last-child{border-right:none;}
.log-stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--accent);}
.log-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
.log-filter{
  display:flex;gap:4px;padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;
}
.log-chip{
  padding:3px 9px;border-radius:20px;font-size:10.5px;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  transition:all .15s;
}
.log-chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.log-list{flex:1;overflow-y:auto;padding:8px;}
.log-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:10px;color:var(--muted);font-size:13px;
}
.log-empty-icon{font-size:36px;opacity:.4;}
.log-item{
  display:flex;gap:10px;padding:10px 8px;border-radius:10px;
  transition:background .15s;margin-bottom:2px;
}
.log-item:hover{background:var(--surface2);}
.log-icon{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.log-content{flex:1;min-width:0;}
.log-action{font-size:12.5px;font-weight:500;color:var(--text);line-height:1.3;}
.log-detail{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.log-time{font-size:10px;color:var(--text3,#555);margin-top:3px;font-family:'DM Sans',monospace;}
.log-clear{
  padding:12px;border-top:1px solid var(--border);flex-shrink:0;
}
.log-clear button{
  width:100%;padding:9px;border-radius:9px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;
  transition:all .15s;
}
.log-clear button:hover{border-color:var(--accent2);color:var(--accent2);}

.logo{cursor:pointer;user-select:none;}
.mob-bar{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--ink, #13131a);
  border-top:1px solid var(--border);
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  flex-direction:column;gap:10px;
  box-shadow:0 -8px 32px rgba(0,0,0,.4);
}

.mob-tools{
  display:flex;
  gap:4px;
  background:var(--surface2);
  border-radius:14px;
  padding:4px;
}
.mob-btn{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  padding:7px 4px;border-radius:10px;border:none;
  background:transparent;color:var(--muted);
  font-family:'DM Sans',sans-serif;font-size:9.5px;font-weight:500;
  cursor:pointer;transition:all .18s;
  min-height:48px;
}
.mob-btn svg{width:18px;height:18px;stroke-width:2;}
.mob-btn.active{
  background:var(--accent);
  color:#fff;
  box-shadow:0 2px 10px rgba(124,106,255,.4);
}

.mob-row2{
  display:flex;align-items:center;gap:8px;
}
.mob-colors-wrap{
  display:flex;align-items:center;gap:7px;
  background:var(--surface2);
  border-radius:10px;
  padding:7px 10px;
  flex:1;
}
.mob-bslider{
  -webkit-appearance:none;appearance:none;
  flex:1;height:3px;border-radius:2px;
  background:var(--border);outline:none;cursor:pointer;
}
.mob-bslider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--accent);cursor:pointer;
  box-shadow:0 0 6px rgba(124,106,255,.5);
}
.mob-icon-btn{
  width:44px;height:44px;border-radius:11px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.mob-icon-btn:active{transform:scale(.93);}
.mob-icon-btn.danger{border-color:rgba(255,106,138,.3);color:var(--accent2);}
.mob-icon-btn.add-btn{
  background:var(--accent);border-color:var(--accent);color:#fff;
  box-shadow:0 4px 14px rgba(124,106,255,.4);
}

/* ── MOBILE SIDE PANEL → BOTTOM SHEET ── */
.mob-node-sheet{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:400;
  background:var(--surface);
  border-top:1px solid var(--border);
  border-radius:22px 22px 0 0;
  padding:14px 16px calc(16px + env(safe-area-inset-bottom));
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -16px 48px rgba(0,0,0,.5);
}
.mob-node-sheet.open{transform:translateY(0);}
.mob-sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px;}
.mob-sheet-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;text-align:center;margin-bottom:14px;}
.mob-sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mob-sheet-btn{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border:1px solid var(--border);border-radius:12px;
  background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;
}
.mob-sheet-btn:active{transform:scale(.96);border-color:var(--accent);}
.mob-sheet-btn span{font-size:20px;}
.mob-sheet-close{
  width:100%;margin-top:10px;padding:12px;border-radius:12px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;
  transition:all .15s;
}
.mob-sheet-close:active{background:var(--surface2);}
.mob-overlay{

<script>
const LOG_KEY='logary_activity_v1';
let logFilter='all';
let logClickCount=0, logClickTimer=null;

const DISCORD_WEBHOOK='https://discord.com/api/webhooks/1485407990080082115/C-I_U4t3VdyLc2p_j6UN6G178kKwVjuUXZJeJgS_VxFBATdRZWQvwdO_MuhiKdnJqess';

const DC_COLORS={
  node:0x7c6aff,
  start:0x6affcc,
  milestone:0xffb86a,
  end:0xff6a8a,
  delete:0xff4444,
  edit:0x5b8cff,
  progress:0xffb86a,
  conn:0x7ab4e8,
};
const DC_ICONS={
  task:'📋',start:'🚀',milestone:'🏁',end:'🎯',
  delete:'🗑️',edit:'✏️',progress:'📊',conn:'🔗',
};

function progressBar(pct){
  const filled=Math.round(pct/10);
  const empty=10-filled;
  return '█'.repeat(filled)+'░'.repeat(empty)+` ${pct}%`;
}

async function sendDiscord(type, nodeType, title, desc='', progress=null, extra=null){
  try{
    const icon=DC_ICONS[nodeType]||DC_ICONS[type]||'📌';
    const color=DC_COLORS[nodeType]||DC_COLORS[type]||0x7c6aff;
    const now=new Date();
    const timeStr=now.toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

    const fields=[];
    if(desc) fields.push({name:'Açıklama',value:desc.slice(0,200)+(desc.length>200?'…':''),inline:false});
    if(progress!==null) fields.push({name:'İlerleme',value:progressBar(progress),inline:false});
    if(extra) fields.push({name:'Detay',value:extra,inline:false});
    fields.push({name:'Zaman',value:timeStr,inline:true});

    const typeLabels={task:'Görev',start:'Başlangıç',milestone:'Kilometre Taşı',end:'Hedef'};
    if(nodeType&&typeLabels[nodeType]) fields.push({name:'Tip',value:`${icon} ${typeLabels[nodeType]}`,inline:true});

    const actionLabels={
      node:'➕ Yeni Node Eklendi',
      delete:'🗑️ Node Silindi',
      edit:'✏️ Node Güncellendi',
      progress:'📊 İlerleme Güncellendi',
      conn:'🔗 Bağlantı Eklendi',
    };

    const payload={
      username:'Logary Roadmap',
      embeds:[{
        title:actionLabels[type]||type,
        description:`**${title||'(başlıksız)'}**`,
        color,fields,
        footer:{text:'Logary Roadmap • logaryapp.github.io'},
        timestamp:now.toISOString(),
      }]
    };

    const res=await fetch(DISCORD_WEBHOOK+'?wait=true',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });

    if(!res.ok){
      const err=await res.text();
      console.warn('Discord hata:',res.status,err);
    }
  }catch(e){
    console.warn('Discord webhook hatası:',e);
  }
}

function logAdd(type, action, detail=''){
  const entry={type,action,detail,ts:Date.now()};
  const logs=JSON.parse(localStorage.getItem(LOG_KEY)||'[]');
  logs.unshift(entry);
  if(logs.length>200)logs.length=200;
  localStorage.setItem(LOG_KEY,JSON.stringify(logs));
  syncLogToSupabase(logs);
}

async function syncLogToSupabase(logs){
  try{
    await fetch(`${SUPA_URL}/rest/v1/roadmap`,{
      method:'POST',
      headers:{...SUPA_HEADERS,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({id:2,data:JSON.stringify(logs),updated_at:new Date().toISOString()})
    });
  }catch(e){}
}

async function loadLogsFromSupabase(){
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/roadmap?id=eq.2&select=data`,{headers:SUPA_HEADERS});
    const rows=await res.json();
    if(rows&&rows.length>0&&rows[0].data){
      const logs=JSON.parse(rows[0].data);
      localStorage.setItem(LOG_KEY,JSON.stringify(logs));
    }
  }catch(e){}
}

async function openLog(){
  document.getElementById('logPanel').classList.add('open');
  await loadLogsFromSupabase();
  renderLog();
}
function closeLog(){document.getElementById('logPanel').classList.remove('open');}

function setLogFilter(el){
  document.querySelectorAll('.log-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  logFilter=el.dataset.f;
  renderLog();
}

function clearLog(){
  if(!confirm('Log temizlenecek. Emin misin?'))return;
  localStorage.removeItem(LOG_KEY);
  renderLog();
}

const LOG_ICONS={node:'📋',edit:'✏️',progress:'📊',conn:'🔗',delete:'🗑️'};
const LOG_COLORS={node:'rgba(124,106,255,.15)',edit:'rgba(106,255,204,.12)',progress:'rgba(255,184,106,.12)',conn:'rgba(122,180,232,.12)',delete:'rgba(255,106,138,.12)'};

function renderLog(){
  const logs=JSON.parse(localStorage.getItem(LOG_KEY)||'[]');
  const list=document.getElementById('logList');
  const today=new Date(); today.setHours(0,0,0,0);

  const filtered=logFilter==='all'?logs:logs.filter(l=>l.type===logFilter);

  document.getElementById('ls-total').textContent=logs.length;
  document.getElementById('ls-today').textContent=logs.filter(l=>l.ts>=today.getTime()).length;
  document.getElementById('ls-nodes').textContent=logs.filter(l=>l.type==='node'||l.type==='delete').length;

  if(filtered.length===0){
    list.innerHTML=`<div class="log-empty"><div class="log-empty-icon">📭</div><span>Henüz aktivite yok</span></div>`;
    return;
  }

  list.innerHTML=filtered.map(l=>{
    const d=new Date(l.ts);
    const dateStr=d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit'});
    const timeStr=d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
    const icon=LOG_ICONS[l.type]||'📌';
    const bg=LOG_COLORS[l.type]||'rgba(124,106,255,.1)';
    return `<div class="log-item">
      <div class="log-icon" style="background:${bg}">${icon}</div>
      <div class="log-content">
        <div class="log-action">${l.action}</div>
        ${l.detail?`<div class="log-detail">${l.detail}</div>`:''}
        <div class="log-time">${dateStr} ${timeStr}</div>
      </div>
    </div>`;
  }).join('');
}

function setupLogoClick(){
  const logo=document.getElementById('logoBtn');
  if(!logo)return;
  logo.addEventListener('click',()=>{
    if(!isOwner())return;
    logClickCount++;
    clearTimeout(logClickTimer);
    if(logClickCount>=3){
      logClickCount=0;
      openLog();
    } else {
      logClickTimer=setTimeout(()=>{logClickCount=0;},600);
    }
  });
}

async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const PW_OWNER='ademcanadmin6060';
const PW_PARTNER='logarymjademadmin';

function isLoggedIn(){return sessionStorage.getItem('logary_auth')==='1';}
function isOwner(){return sessionStorage.getItem('logary_owner')==='1';}

async function doLogin(){
  const pw=document.getElementById('pwInput').value.trim();
  const inp=document.getElementById('pwInput');
  const err=document.getElementById('loginErr');
  if(!pw){inp.classList.add('err');setTimeout(()=>inp.classList.remove('err'),400);return;}

  const [hashInput, hashOwner, hashPartner] = await Promise.all([
    sha256(pw),
    sha256(PW_OWNER),
    sha256(PW_PARTNER)
  ]);

  if(hashInput===hashOwner||hashInput===hashPartner){
    sessionStorage.setItem('logary_auth','1');
    if(hashInput===hashOwner) sessionStorage.setItem('logary_owner','1');
    else sessionStorage.removeItem('logary_owner');
    const ls=document.getElementById('loginScreen');
    ls.style.opacity='0';ls.style.transition='opacity .4s';
    setTimeout(()=>{ls.style.display='none';},400);
    err.classList.remove('show');
    initApp();
    if(hashInput===hashOwner) setTimeout(openLog,600);
  } else {
    inp.classList.add('err');err.classList.add('show');inp.value='';
    setTimeout(()=>inp.classList.remove('err'),400);
  }
}

function doLogout(){sessionStorage.removeItem('logary_auth');location.reload();}

let tool='select',drawColor='#7c6aff',brushSz=3;
let drawing=false,lx=0,ly=0;
let nodes=[],conns=[],nid=0;
let labels=[],lid=0;
let selId=null,dragNode=null,dragOx=0,dragOy=0;
let connFrom=null,saveTimer=null;
let scale=1,panX=0,panY=0;
let isPanning=false,panSx=0,panSy=0,panOx=0,panOy=0;
let spaceDown=false;
let appReady=false;

const SKEY='logary_v3';
let canvas,ctx,NL,SVG,wrap,VP;

async function initApp(){
  if(appReady)return;
  appReady=true;
  canvas=document.getElementById('drawCanvas');
  ctx=canvas.getContext('2d');
  NL=document.getElementById('nodeLayer');
  SVG=document.getElementById('connSvg');
  wrap=document.getElementById('wrap');
  VP=document.getElementById('viewport');

  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const wr=wrap.getBoundingClientRect();
    zoomBy(e.deltaY<0?0.1:-0.1,e.clientX-wr.left,e.clientY-wr.top);
  },{passive:false});

  wrap.addEventListener('pointerdown',e=>{
    if(e.button===1||(e.button===0&&spaceDown)){
      isPanning=true;panSx=e.clientX;panSy=e.clientY;panOx=panX;panOy=panY;
      wrap.setPointerCapture(e.pointerId);wrap.style.cursor='grabbing';e.preventDefault();
    }
  });
  wrap.addEventListener('pointermove',e=>{
    if(!isPanning)return;
    panX=panOx+(e.clientX-panSx);panY=panOy+(e.clientY-panSy);applyVP();
  });
  wrap.addEventListener('pointerup',()=>{isPanning=false;wrap.style.cursor='';});

  document.addEventListener('keydown',e=>{
    if(e.code==='Space'&&e.target.tagName!=='TEXTAREA'&&e.target.tagName!=='INPUT'){
      spaceDown=true;wrap.style.cursor='grab';e.preventDefault();
    }
    if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
    const m={v:'select',p:'draw',e:'erase',c:'connect',t:'text'};
    if(m[e.key.toLowerCase()])setTool(m[e.key.toLowerCase()]);
    if((e.key==='Delete'||e.key==='Backspace')&&selId)delNode(selId);
    if(e.key==='Escape'){selId=null;connFrom=null;clearHL();document.querySelectorAll('.rnode').forEach(n=>n.classList.remove('sel'));}
    if((e.key==='='||e.key==='+')&&(e.ctrlKey||e.metaKey)){e.preventDefault();zoomBy(0.1);}
    if(e.key==='-'&&(e.ctrlKey||e.metaKey)){e.preventDefault();zoomBy(-0.1);}
    if(e.key==='0'&&(e.ctrlKey||e.metaKey)){e.preventDefault();resetZoom();}
  });
  document.addEventListener('keyup',e=>{if(e.code==='Space'){spaceDown=false;wrap.style.cursor='';}});
  NL.addEventListener('input',()=>scheduleSave());
  document.getElementById('bsz').addEventListener('input',e=>brushSz=+e.target.value);

  const mobBsz=document.getElementById('bszMob');
  if(mobBsz) mobBsz.addEventListener('input',e=>{brushSz=+e.target.value;document.getElementById('bsz').value=e.target.value;});

  let t1={id:-1,x:0,y:0},t2={id:-1,x:0,y:0};
  let tPanOx=0,tPanOy=0;
  let tPinchDist=0,tPinchScale=1,tPinchPanOx=0,tPinchPanOy=0;
  let tNodeId=null,tNodeOx=0,tNodeOy=0;
  let tMode='none';

  function getTouchById(list,id){for(let t of list)if(t.identifier===id)return t;return null;}

  VP.addEventListener('touchstart',e=>{
    for(let t of e.changedTouches){
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const dragEl=el?.closest('.node-drag');
      if(dragEl&&tool!=='connect'){
        const nodeId=+dragEl.id.replace('drag','');
        const node=nodes.find(x=>x.id===nodeId);
        if(node){
          tMode='nodedrag';tNodeId=nodeId;
          tNodeOx=node.x-(t.clientX-panX)/scale;
          tNodeOy=node.y-(t.clientY-panY)/scale;
          t1={id:t.identifier,x:t.clientX,y:t.clientY};
          selectNode(nodeId);
          const nel=document.getElementById('n'+nodeId);
          if(nel)nel.style.zIndex=800;
          e.stopPropagation();
          return;
        }
      }
    }
  },{passive:true});

  wrap.addEventListener('touchstart',e=>{
    if(tMode==='nodedrag')return;
    if(tool==='draw'||tool==='erase'){tMode='draw';return;}
    const ct=e.changedTouches;
    if(e.touches.length===1){
      t1={id:ct[0].identifier,x:ct[0].clientX,y:ct[0].clientY};
      tPanOx=panX;tPanOy=panY;tMode='pan';
    } else if(e.touches.length===2){
      t1={id:e.touches[0].identifier,x:e.touches[0].clientX,y:e.touches[0].clientY};
      t2={id:e.touches[1].identifier,x:e.touches[1].clientX,y:e.touches[1].clientY};
      tPinchDist=Math.hypot(t1.x-t2.x,t1.y-t2.y);
      tPinchScale=scale;tPinchPanOx=panX;tPinchPanOy=panY;tMode='pinch';
    }
  },{passive:true});

  wrap.addEventListener('touchmove',e=>{
    if(tMode==='draw')return;
    e.preventDefault();
    if(tMode==='nodedrag'&&e.touches.length>=1){
      const t=getTouchById(e.touches,t1.id)||e.touches[0];
      const node=nodes.find(x=>x.id===tNodeId);
      if(node){
        node.x=(t.clientX-panX)/scale+tNodeOx;
        node.y=(t.clientY-panY)/scale+tNodeOy;
        const nel=document.getElementById('n'+node.id);
        if(nel){nel.style.left=node.x+'px';nel.style.top=node.y+'px';}
        redrawConns();
      }
      return;
    }
    if(tMode==='pan'&&e.touches.length===1){
      const t=e.touches[0];
      panX=tPanOx+(t.clientX-t1.x);
      panY=tPanOy+(t.clientY-t1.y);
      applyVP();return;
    }
    if(tMode==='pinch'&&e.touches.length===2){
      const ta=e.touches[0],tb=e.touches[1];
      const dist=Math.hypot(ta.clientX-tb.clientX,ta.clientY-tb.clientY);
      const ratio=dist/tPinchDist;
      const ns=Math.min(3,Math.max(0.15,tPinchScale*ratio));
      const cx=(ta.clientX+tb.clientX)/2;
      const cy=(ta.clientY+tb.clientY)/2;
      const wr=wrap.getBoundingClientRect();
      const ox=cx-wr.left,oy=cy-wr.top;
      panX=ox-(ox-tPinchPanOx)*(ns/tPinchScale);
      panY=oy-(oy-tPinchPanOy)*(ns/tPinchScale);
      scale=ns;applyVP();resizeCanvas();return;
    }
    if(tMode==='pan'&&e.touches.length===2){
      t1={id:e.touches[0].identifier,x:e.touches[0].clientX,y:e.touches[0].clientY};
      t2={id:e.touches[1].identifier,x:e.touches[1].clientX,y:e.touches[1].clientY};
      tPinchDist=Math.hypot(t1.x-t2.x,t1.y-t2.y);
      tPinchScale=scale;tPinchPanOx=panX;tPinchPanOy=panY;tMode='pinch';
    }
  },{passive:false});

  wrap.addEventListener('touchend',e=>{
    if(tMode==='nodedrag')scheduleSave();
    if(e.touches.length===0){tMode='none';tNodeId=null;}
    else if(e.touches.length===1&&tMode==='pinch'){
      t1={id:e.touches[0].identifier,x:e.touches[0].clientX,y:e.touches[0].clientY};
      tPanOx=panX;tPanOy=panY;tMode='pan';
    }
  },{passive:true});

  wrap.addEventListener('touchcancel',()=>{tMode='none';tNodeId=null;},{passive:true});

  canvas.addEventListener('pointerdown',e=>{
    if(tool==='text'){
      const r=canvas.getBoundingClientRect();
      addLabel((e.clientX-r.left-panX)/scale,(e.clientY-r.top-panY)/scale);return;
    }
    if(tool!=='draw'&&tool!=='erase')return;
    drawing=true;
    const r=canvas.getBoundingClientRect();
    lx=(e.clientX-r.left)/scale;ly=(e.clientY-r.top)/scale;
    if(tool==='erase')ctx.clearRect(lx-brushSz*2,ly-brushSz*2,brushSz*4,brushSz*4);
    else{ctx.beginPath();ctx.arc(lx,ly,brushSz/2,0,Math.PI*2);ctx.fillStyle=drawColor;ctx.fill();}
  });
  canvas.addEventListener('pointermove',e=>{
    if(!drawing)return;
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)/scale,y=(e.clientY-r.top)/scale;
    if(tool==='erase')ctx.clearRect(x-brushSz*2,y-brushSz*2,brushSz*4,brushSz*4);
    else{
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);
      ctx.strokeStyle=drawColor;ctx.lineWidth=brushSz;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.globalAlpha=.9;ctx.stroke();ctx.globalAlpha=1;
    }
    lx=x;ly=y;
  });
  canvas.addEventListener('pointerup',()=>{drawing=false;scheduleSave();});
  canvas.addEventListener('pointerleave',()=>{drawing=false;});

  window.addEventListener('resize',resize);
  resize();
  const ok=await doLoad();
  if(!ok)loadPreset();
  setTool('select');
  startRealtimeSync();
}

function applyVP(){
  VP.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
  const gs=40*scale;
  document.getElementById('gridbg').style.backgroundSize=`${gs}px ${gs}px`;
  document.getElementById('gridbg').style.backgroundPosition=`${panX}px ${panY}px`;
  document.getElementById('zoomPct').textContent=Math.round(scale*100)+'%';
}
function zoomBy(delta,cx,cy){
  const wr=wrap.getBoundingClientRect();
  cx=cx??wr.width/2;cy=cy??wr.height/2;
  const ns=Math.min(3,Math.max(0.15,scale+delta));
  panX=cx-(cx-panX)*(ns/scale);panY=cy-(cy-panY)*(ns/scale);
  scale=ns;applyVP();resizeCanvas();
}
function resetZoom(){scale=1;panX=0;panY=0;applyVP();resizeCanvas();}

function resizeCanvas(){
  if(!canvas)return;
  const r=wrap.getBoundingClientRect();
  const iw=Math.round(r.width/scale),ih=Math.round(r.height/scale);
  if(canvas.width===iw&&canvas.height===ih)return;
  const img=(canvas.width>0&&canvas.height>0)?ctx.getImageData(0,0,canvas.width,canvas.height):null;
  canvas.width=iw;canvas.height=ih;
  canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';
  if(img)ctx.putImageData(img,0,0);
  redrawConns();
}
function resize(){resizeCanvas();applyVP();}

async function doSave(){
  try{
    nodes.forEach(n=>{
      const el=document.getElementById('n'+n.id);if(!el)return;
      n.title=el.querySelector('.ntitle').value;
      n.desc=el.querySelector('.ndesc').value;
    });
    labels.forEach(l=>{
      const el=document.getElementById('l'+l.id);if(!el)return;
      l.text=el.querySelector('textarea').value;
    });

    const payload={nodes,conns,nid,labels,lid};
    localStorage.setItem(SKEY,JSON.stringify(payload));

    const saveRes=await fetch(`${SUPA_URL}/rest/v1/roadmap`,{
      method:'POST',
      headers:{...SUPA_HEADERS,'Prefer':'resolution=merge-duplicates,return=representation'},
      body:JSON.stringify({id:ROW_ID,data:JSON.stringify(payload),updated_at:new Date().toISOString()})
    });
    const saved=await saveRes.json();
    if(saved&&saved[0]&&saved[0].updated_at) window._lastUpdated=saved[0].updated_at;

    setSB('saved','Kaydedildi ✓');setTimeout(()=>setSB('','Kaydedildi'),2000);

async function doLoad(){
  if(FORCE_PRESET)return false;
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/roadmap?id=eq.${ROW_ID}&select=data,updated_at`,{
      headers:SUPA_HEADERS
    });
    const rows=await res.json();
    if(!rows||rows.length===0||!rows[0].data){
      const local=localStorage.getItem(SKEY);
      if(local) return loadFromJSON(JSON.parse(local));
      return false;
    }
    window._lastUpdated=rows[0].updated_at;
    const d=JSON.parse(rows[0].data);
    return loadFromJSON(d);
  }catch(e){
    const local=localStorage.getItem(SKEY);
    if(local) return loadFromJSON(JSON.parse(local));
    return false;
  }
}

function loadFromJSON(d){
  try{
    if(!d||!d.nodes||d.nodes.length===0)return false;
    nodes=d.nodes;conns=d.conns||[];nid=d.nid||0;
    labels=d.labels||[];lid=d.lid||0;
    nodes.forEach(n=>buildNode(n));
    labels.forEach(l=>buildLabel(l));
    setTimeout(redrawConns,80);
    setSB('saved','Yüklendi ✓');setTimeout(()=>setSB('','Kaydedildi'),2000);
    return true;
  }catch(e){return false;}
}

function startRealtimeSync(){
  setInterval(async()=>{
    try{
      const res=await fetch(`${SUPA_URL}/rest/v1/roadmap?id=eq.${ROW_ID}&select=data,updated_at`,{
        headers:SUPA_HEADERS
      });
      const rows=await res.json();
      if(!rows||rows.length===0)return;
      const remoteTs=rows[0].updated_at;
      if(remoteTs===window._lastUpdated)return;
      window._lastUpdated=remoteTs;
      const remote=JSON.parse(rows[0].data);
      nodes=remote.nodes||[];conns=remote.conns||[];nid=remote.nid||0;
      labels=remote.labels||[];lid=remote.lid||0;
      NL.innerHTML='';SVG.innerHTML='';
      nodes.forEach(n=>buildNode(n));
      labels.forEach(l=>buildLabel(l));
      setTimeout(redrawConns,80);
    }catch(e){}

    if(document.getElementById('logPanel').classList.contains('open')){
      await loadLogsFromSupabase();

}

  const map={select:'Sel',draw:'Draw',erase:'Erase',connect:'Conn',text:'Text'};

  ['Sel','Draw','Erase','Conn','Text'].forEach(n=>document.getElementById('mt'+n)?.classList.remove('active'));
  document.getElementById('mt'+map[t])?.classList.add('active');

  el.innerHTML=`<button class="ftxt-del" onclick="delLabel(${label.id})">×</button>
    <textarea rows="1" placeholder="Başlık yaz…" spellcheck="false">${label.text||''}</textarea>`;
  const ta=el.querySelector('textarea');
  const grow=()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';ta.style.width='auto';ta.style.width=Math.max(80,ta.scrollWidth)+'px';};
  ta.addEventListener('input',()=>{grow();scheduleSave();});
  setTimeout(()=>{grow();if(focusNow)ta.focus();},0);
  let ldrag=false,lox=0,loy=0;
  ta.addEventListener('pointerdown',e=>{
    if(window.getSelection().toString())return;
    ldrag=true;lox=label.x-(e.clientX-panX)/scale;loy=label.y-(e.clientY-panY)/scale;
    el.classList.add('sel');ta.setPointerCapture(e.pointerId);

  ta.addEventListener('pointermove',e=>{
    if(!ldrag)return;

    el.style.left=label.x+'px';el.style.top=label.y+'px';

  ta.addEventListener('pointerup',()=>{if(ldrag){ldrag=false;scheduleSave();}});

const TLABEL={task:'GÖREV',start:'BAŞLANGIÇ',milestone:'KM TAŞI',end:'HEDEF'};
function addNode(type,x,y){

  const node={id,type,x:x??(-panX/scale+50+Math.random()*(r.width/scale-300)),y:y??(-panY/scale+50+Math.random()*(r.height/scale-220)),title:'',desc:'',progress:type==='start'?100:type==='end'?0:35};

      <span class="prog-pct" id="pp${node.id}">${node.progress}%</span>
    </div>`;
  let dcSent=false;

  el.querySelectorAll('textarea').forEach(ta=>{

      },2000);
    });
    ta.addEventListener('blur', tryDC);
    setTimeout(grow,0);
  });

  el.querySelector('.prog-range').addEventListener('change', tryDC);
  const handle=el.querySelector('#drag'+node.id);
  handle.addEventListener('pointerdown',e=>{
    if(e.target.tagName==='BUTTON')return;
    if(tool==='connect'){handleConn(node.id,el);return;}
    selectNode(node.id);dragNode=node;
    dragOx=node.x-(e.clientX-panX)/scale;dragOy=node.y-(e.clientY-panY)/scale;
    el.style.zIndex=800;handle.setPointerCapture(e.pointerId);e.preventDefault();
  });
  handle.addEventListener('pointermove',e=>{
    if(!dragNode||dragNode.id!==node.id)return;
    node.x=(e.clientX-panX)/scale+dragOx;node.y=(e.clientY-panY)/scale+dragOy;
    el.style.left=node.x+'px';el.style.top=node.y+'px';redrawConns();
  });
  handle.addEventListener('pointerup',()=>{if(dragNode&&dragNode.id===node.id){dragNode=null;scheduleSave();}});
  el.querySelector('.node-body').addEventListener('pointerdown',e=>{if(tool==='connect'){e.preventDefault();handleConn(node.id,el);}});
  NL.appendChild(el);
}
function selectNode(id){document.querySelectorAll('.rnode').forEach(n=>n.classList.remove('sel'));selId=id;if(id)document.getElementById('n'+id)?.classList.add('sel');}
function setProgress(id,v){
  const n=nodes.find(x=>x.id===id);if(!n)return;
  const old=n.progress; n.progress=v;
  document.getElementById('pf'+id).style.width=v+'%';document.getElementById('pp'+id).textContent=v+'%';
  logAdd('progress',`İlerleme güncellendi: ${n.title||'(başlıksız)'}`,`%${old} → %${v}`);
  scheduleSave();
}
function delNode(id){
  const n=nodes.find(x=>x.id===id);
  logAdd('delete',`Node silindi: ${n?.title||'(başlıksız)'}`,TLABEL[n?.type]||'');
  sendDiscord('delete', n?.type, n?.title||'(başlıksız)', n?.desc||'');
  nodes=nodes.filter(n=>n.id!==id);conns=conns.filter(c=>c.a!==id&&c.b!==id);
  document.getElementById('n'+id)?.remove();redrawConns();scheduleSave();
}

function handleConn(id,el){
  if(connFrom===null){connFrom=id;el.classList.add('sel');el.style.borderColor='#ffb86a';}
  else if(connFrom!==id){
    if(!conns.find(c=>(c.a===connFrom&&c.b===id)||(c.a===id&&c.b===connFrom))){
      conns.push({a:connFrom,b:id});
      const a=nodes.find(x=>x.id===connFrom), b=nodes.find(x=>x.id===id);
      logAdd('conn','Bağlantı eklendi',`${a?.title||'Node'} → ${b?.title||'Node'}`);
      sendDiscord('conn','conn',`${a?.title||'Node'} → ${b?.title||'Node'}`,'');
    }
    clearHL();connFrom=null;redrawConns();scheduleSave();
  }
}
function clearHL(){document.querySelectorAll('.rnode').forEach(n=>{n.style.borderColor='';});}
function midOf(id){
  const el=document.getElementById('n'+id);if(!el)return null;
  const n=nodes.find(x=>x.id===id);if(!n)return null;
  const w=el.offsetWidth,h=el.offsetHeight;
  return{r:{x:n.x+w,y:n.y+h/2},l:{x:n.x,y:n.y+h/2},cx:n.x+w/2,cy:n.y+h/2};
}
function redrawConns(){
  if(!SVG)return;
  SVG.innerHTML='';
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=`<marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="rgba(124,106,255,.75)"/></marker>`;
  SVG.appendChild(defs);
  conns.forEach(c=>{
    const a=midOf(c.a),b=midOf(c.b);if(!a||!b)return;
    const dx=b.cx-a.cx;
    const x1=dx>=0?a.r.x:a.l.x,y1=a.r.y,x2=dx>=0?b.l.x:b.r.x,y2=b.l.y;
    const cp=Math.abs(x2-x1)*.45;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1},${y1} C${x1+(dx>=0?cp:-cp)},${y1} ${x2+(dx>=0?-cp:cp)},${y2} ${x2},${y2}`);
    p.setAttribute('stroke','rgba(124,106,255,.55)');p.setAttribute('stroke-width','1.5');
    p.setAttribute('fill','none');p.setAttribute('stroke-dasharray','5,3');p.setAttribute('marker-end','url(#arr)');
    SVG.appendChild(p);
  });
}

function clearDraw(){ctx.clearRect(0,0,canvas.width,canvas.height);scheduleSave();}

function toggleNodeSheet(){
  document.getElementById('mobSheet').classList.toggle('open');
  document.getElementById('mobOverlay').classList.toggle('show');
}
function closeNodeSheet(){
  document.getElementById('mobSheet').classList.remove('open');
  document.getElementById('mobOverlay').classList.remove('show');
}
function clearAll(){
  if(!confirm('Her şey silinecek. Devam?'))return;
  clearDraw();nodes=[];conns=[];labels=[];NL.innerHTML='';SVG.innerHTML='';nid=0;lid=0;
  localStorage.removeItem(SKEY);setSB('','Temizlendi');
}
async function exportPNG(){
  const btn=document.getElementById('expBtn'),ov=document.getElementById('expOverlay');
  btn.disabled=true;ov.classList.add('show');
  document.getElementById('sidePanel').style.visibility='hidden';
  document.getElementById('hint').style.visibility='hidden';
  document.querySelector('.zoom-controls').style.visibility='hidden';
  try{
    const shot=await html2canvas(wrap,{backgroundColor:'#0f0f13',scale:2,useCORS:true,allowTaint:true,logging:false,ignoreElements:el=>el.id==='drawCanvas'});
    const final=document.createElement('canvas');final.width=shot.width;final.height=shot.height;
    const fc=final.getContext('2d');fc.drawImage(shot,0,0);fc.drawImage(canvas,0,0,final.width,final.height);
    const a=document.createElement('a');a.download='logary-roadmap.png';a.href=final.toDataURL('image/png');a.click();
  }catch(err){alert('Export hatası: '+err.message);}
  finally{
    document.getElementById('sidePanel').style.visibility='';
    document.getElementById('hint').style.visibility='';
    document.querySelector('.zoom-controls').style.visibility='';
    ov.classList.remove('show');btn.disabled=false;
  }
}

function loadPreset(){
  nodes=[...PRESET_NODES.map(n=>({...n}))];
  conns=[...PRESET_CONNS.map(c=>({...c}))];
  labels=[...PRESET_LABELS.map(l=>({...l}))];
  nid=Math.max(...nodes.map(n=>n.id),0);
  lid=Math.max(...labels.map(l=>l.id),0);
  nodes.forEach(n=>{
    buildNode(n);
    const el=document.getElementById('n'+n.id);if(!el)return;
    el.querySelector('.ntitle').value=n.title;
    el.querySelector('.ndesc').value=n.desc;
    el.querySelector('.prog-fill').style.width=n.progress+'%';
    el.querySelector('.prog-range').value=n.progress;
    el.querySelector('.prog-pct').textContent=n.progress+'%';
    el.querySelectorAll('textarea').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
  });
  labels.forEach(l=>buildLabel(l));
  setTimeout(()=>{redrawConns();doSave();},150);
}

window.addEventListener('load',()=>{
  document.getElementById('pwInput').focus();
  setupLogoClick();
  if(isLoggedIn()){
    document.getElementById('loginScreen').style.display='none';
    initApp();
    if(isOwner()) setTimeout(openLog,600);
  }
});
</script>
